/* ── GLASSMORPHISM LIGHT EFFECT (A2) ── */
function initLightEffect(){
  let hoverSeen=false;
  const onMove=e=>{
    if(!hoverSeen){hoverSeen=true;document.body.classList.remove('fallback-shimmer')}
    const px=(e.clientX/window.innerWidth)*100;
    const py=(e.clientY/window.innerHeight)*100;
    document.documentElement.style.setProperty('--light-pos-x',`${px}%`);
    document.documentElement.style.setProperty('--light-pos-y',`${py}%`);
  };
  document.body.addEventListener('mousemove',onMove,{passive:true});
  // Fallback: if no mousemove within 2s (touch/mobile devices), enable CSS shimmer animation
  const fallbackTimer=setTimeout(()=>{
    if(!hoverSeen)document.body.classList.add('fallback-shimmer');
  },2000);
  document.body.addEventListener('mousemove',()=>clearTimeout(fallbackTimer),{once:true,passive:true});
}

/* ── SCROLL ANIMATIONS (A3/A10) ── */
let _lastScrollTop=0;
/* Item 7: hysteresis state variables */
let _navCollapsed=false;
const COLLAPSE_THRESHOLD=50;
const HYSTERESIS=8;
/* FIX Issue 8: Track scroll listener reference so renderNow can clean it up before re-attaching */
let _scrollHandler=null;
function initScrollAnimations(){
  const cnt=document.getElementById('cnt');
  if(!cnt)return;
  /* Remove previous scroll listener before adding a new one to prevent accumulation */
  if(_scrollHandler){cnt.removeEventListener('scroll',_scrollHandler);_scrollHandler=null;}
  let _rafPending=false;
  function handleScroll(){
    if(_rafPending)return;
    _rafPending=true;
    requestAnimationFrame(()=>{
      _rafPending=false;
      const st=cnt.scrollTop;
      /* Item 6: animate the wrapper div, not the canvas directly */
      const wrapper=document.getElementById('hero-sphere-wrapper');
      if(wrapper){
        const prog=Math.min(1,st/200);
        const scale=1-(prog*0.4);const tx2=prog*20;const ty2=-prog*30;const op=1-(prog*0.5);
        wrapper.style.transform=`scale(${scale}) translate(${tx2}px,${ty2}px)`;
        wrapper.style.opacity=String(Math.max(0,op)*0.4);
      }
      // FAB
      const fab=document.getElementById('fab-log');
      if(fab){
        if(CUR==='home'){
          const op=Math.min(1,Math.max(0,(st-150)/50));
          fab.style.opacity=String(op);
          fab.style.transform=`scale(${0.8+op*0.2})`;
          fab.style.pointerEvents=op>0.1?'auto':'none';
        } else {
          fab.style.opacity='0';fab.style.pointerEvents='none';
        }
      }
      /* Item 7: hysteresis for stable nav collapse */
      const tbar=document.getElementById('tbar');
      if(tbar){
        if(st>COLLAPSE_THRESHOLD&&st>_lastScrollTop+HYSTERESIS&&!_navCollapsed){
          tbar.classList.add('nav-collapsed');_navCollapsed=true;
        } else if((st<COLLAPSE_THRESHOLD||st<_lastScrollTop-HYSTERESIS)&&_navCollapsed){
          tbar.classList.remove('nav-collapsed');_navCollapsed=false;
        }
      }
      // Issue 11 FIX: apply parallax via CSS custom property so it doesn't overwrite card's own transform
      if(CUR==='home'){
        const py=`${st*0.05}px`;
        document.querySelectorAll('.sparkline-card').forEach(card=>{
          card.style.setProperty('--parallax-y',py);
        });
        const duelWrap=document.querySelector('.duel-chart-wrap');
        if(duelWrap)duelWrap.style.setProperty('--parallax-y',`${st*0.03}px`);
      }
      _lastScrollTop=st;
    });
  }
  _scrollHandler=handleScroll;
  cnt.addEventListener('scroll',handleScroll,{passive:true});
}

function saveLog(){
  /* Item 4: Lock save button during async operation */
  const saveBtn=document.getElementById('log-save-btn');
  const originalText=saveBtn?saveBtn.textContent:'💾 Save Entry';
  if(saveBtn){saveBtn.disabled=true;saveBtn.textContent='⏳ Saving...';}
  const restoreBtn=()=>{if(saveBtn){saveBtn.disabled=false;saveBtn.textContent=originalText;}};

  const profs=gProfs();
  const doSave=()=>{
    /* Item 2: Explicit pid — never use implicit state */
    const pid=gActive();
    // F1: extra validation
    const nowMidnight=new Date();nowMidnight.setHours(0,0,0,0);
    if(parseDate(LS.date)>nowMidnight){showToast('Cannot log future dates');restoreBtn();return}
    // F2: 7-day lock
    const daysDiff=Math.floor((new Date(today())-parseDate(LS.date))/(1000*60*60*24));
    if(daysDiff>7){showToast('🔒 Entry too old to edit');restoreBtn();return}
    initAudio();
    const sph=gSph(pid);const sc={};
    /* Item 16: preserve null values for N/A spheres */
    sph.forEach(s=>{sc[s.id]={value:LS.scores[s.id]===null?null:(LS.scores[s.id]??7),notes:LS.notes[s.id]||''}});
    checkCelebrate(pid,sc);
    Haptics.success();
    /* FIX Issue 7: write log and updated XP atomically in one IDB transaction */
    const logs=gLogs(pid).filter(l=>l.date!==LS.date);
    logs.push({id:uid(),date:LS.date,scores:sc});
    /* Compute updated profiles with incremented XP before writing */
    const profsWithXP=gProfs().map(p=>p.id===pid?{...p,companionXP:(p.companionXP||0)+1}:p);
    /* Optimistically update CACHE so the rest of the app sees consistent state */
    CACHE[K.lg(pid)]=logs;
    CACHE[K.PRF]=profsWithXP;
    /* Single atomic IDB transaction for both keys */
    IDB.setMultiple([[K.lg(pid),logs],[K.PRF,profsWithXP]]).catch(err=>{
      console.error('[GrowthCodex] Atomic save failed',err);
      showToast('⚠️ Save error — data may not persist');
    });
    /* Trigger XP side-effects (level-up toast, animation) using the new XP value */
    const updProf=profsWithXP.find(p=>p.id===pid);
    if(updProf){
      const prevXP=(updProf.companionXP||1)-1;
      const newXP=updProf.companionXP;
      const prevLevel=computeLevel(prevXP);const newLevel=computeLevel(newXP);
      if(newLevel>prevLevel){
        const unlocksMsg=newLevel===5?' 🎩 Hat unlocked!':newLevel===10?' 🦸 Cape unlocked!':'';
        setTimeout(()=>{showToast(`⭐ Level ${newLevel} reached!${unlocksMsg}`,3200);showDI({icon:'⭐',iconType:'trophy',title:`Level ${newLevel} reached!`,sub:unlocksMsg||'Your companion grows stronger',ms:3800,pulse:true});pipSay(`Level ${newLevel}! ${unlocksMsg||'Keep going!'}`);},500);
      }
    }
    autoBackup();
    restoreBtn();
    showToast('✓ Entry saved');
    /* Item 20, 21: Avatar reaction to save — triggered pre-nav so animation plays on log tab */
    const avgScore=Object.values(sc).filter(v=>v?.value!=null).reduce((a,b,_,arr)=>a+(b.value/arr.length),0);
    const hasNA=Object.values(sc).some(v=>v?.value===null);
    if(hasNA){triggerAvatarEvent('sphereSkipped');}
    else{triggerAvatarEvent(avgScore>=7?'logSave_high':'logSave_low');}
    _invalidateCache();
    /* FIX Image 4: navigate first, then fire pip/DI messages after home has rendered
       so pip-bubble anchors to the real #hero-avatar position, not a transitioning state */
    setTimeout(()=>{
      goTab('home');
      /* Small extra delay so tHome DOM is painted before pipSay queries #hero-avatar */
      setTimeout(()=>{
        if(hasNA){
          pipSay('Skipped a few — that\'s OK! 🤷',2200);
          showDI({icon:'📝',iconType:'info',title:'Entry saved',sub:'Some spheres skipped — that\'s OK',ms:3500});
        } else {
          pipSay(avgScore>=8?'Amazing work today! 🌟':avgScore>=6?'Great job! Keep it up! 💪':'Keep going — every day counts! 🔥');
          if(avgScore>=8){
            showDI({icon:'🌟',iconType:'trophy',title:'Outstanding entry!',sub:`Score: ${avgScore.toFixed(1)}/10 · Keep it going`,ms:4200,pulse:true});
          } else if(avgScore>=6){
            showDI({icon:'✓',iconType:'success',title:'Entry saved',sub:`Score: ${avgScore.toFixed(1)}/10 · Keep it up!`,ms:3800});
          } else {
            showDI({icon:'💪',iconType:'info',title:'Entry saved',sub:`Score: ${avgScore.toFixed(1)}/10 · Every day counts`,ms:3500});
          }
        }
      },480);
    },420);
  };  // end doSave
  // F3/F4: require dual passcode verification if any profile has a passcode set
  if(profs.some(p=>p.passcodeHash)){
    verifyPasscodes(doSave).catch(()=>restoreBtn());
  } else {
    doSave();
  }
}

function renderMonthlyChart(sphereId){

/* ── B9: Area chart with comparison overlay ── */
function areaChartWithOverlay(series,labels,w,h){
  const n=labels.length;if(n<2)return`<div class="empty" style="padding:18px"><p>Need ≥2 points</p></div>`;
  const pL=28,pR=8,pT=10,pB=20,pw=w-pL-pR,ph=h-pT-pB;
  const uid_c='ac'+Date.now();
  /* Item 14: viewBox for responsive scaling */
  let s=`<svg width="100%" height="${h}" viewBox="0 0 ${w} ${h}" style="display:block;overflow:visible" id="${uid_c}">`;
  [0,50,100].forEach(pct=>{const y=pT+ph-(pct/100)*ph;s+=`<line x1="${pL}" y1="${y}" x2="${w-pR}" y2="${y}" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>`;if(pct>0)s+=`<text x="${pL-3}" y="${y+3.5}" fill="rgba(237,227,200,0.22)" font-size="7.5" text-anchor="end">${pct/10}</text>`});
  series.forEach((sr,si)=>{
    const isDash=sr.dash;
    const srcN=Math.max(sr.values.length,1);
    const pts=sr.values.map((v,i)=>({x:pL+(i/(Math.max(srcN-1,1)))*pw,y:pT+ph-(v/10)*ph,v}));
    const gid=`ag${si}${Date.now()}`;
    if(!isDash){
      let area=`M${pts[0].x},${pT+ph}`;pts.forEach(p=>area+=` L${p.x},${p.y}`);area+=` L${pts[pts.length-1].x},${pT+ph} Z`;
      s+=`<defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${sr.color}" stop-opacity="0.35"/><stop offset="100%" stop-color="${sr.color}" stop-opacity="0.02"/></linearGradient></defs>`;
      s+=`<path d="${area}" fill="url(#${gid})"/>`;
    }
    let line=`M${pts[0].x},${pts[0].y}`;pts.slice(1).forEach(p=>line+=` L${p.x},${p.y}`);
    s+=`<path d="${line}" fill="none" stroke="${sr.color}" stroke-width="${isDash?1.4:1.8}" stroke-linejoin="round"${isDash?' stroke-dasharray="5,4"':''}/>`;
    // B9: data point circles with tooltip metadata
    if(!isDash)pts.forEach((p,i)=>{
      s+=`<circle cx="${p.x}" cy="${p.y}" r="3.5" fill="${sr.color}" class="ao-dot" data-chart="${uid_c}" data-idx="${i}" data-val="${p.v.toFixed(1)}" data-lbl="${labels[i]||''}" data-prev="" style="cursor:pointer"/>`;
    });
    // For dashed (prev period) series — store values as data on corresponding main dots
    if(isDash){
      pts.forEach((p,i)=>{
        // We'll inject prev values via JS after render by matching idx
        s+=`<circle cx="${p.x}" cy="${p.y}" r="2" fill="${sr.color}" opacity="0.45" class="ao-prev-dot" data-chart="${uid_c}" data-idx="${i}" data-prev="${p.v.toFixed(1)}"/>`;
      });
    }
  });
  const step=Math.max(1,Math.floor(n/5));
  labels.forEach((l,i)=>{if(i%step!==0&&i!==n-1)return;const x=pL+(i/(n-1))*pw;s+=`<text x="${x}" y="${h-4}" fill="rgba(237,227,200,0.22)" font-size="7.5" text-anchor="middle">${l}</text>`});
  s+=`</svg>`;
  // B9: attach tooltips after HTML injection via requestAnimationFrame
  requestAnimationFrame(()=>{
    const svg=document.getElementById(uid_c);if(!svg)return;
    // Build lookup of prev values by index
    const prevMap={};
    svg.querySelectorAll('.ao-prev-dot').forEach(el=>{prevMap[el.dataset.idx]=el.dataset.prev});
    const tip=ensureChartTip();
    svg.querySelectorAll('.ao-dot').forEach(el=>{
      const show=e=>{
        const lbl=el.dataset.lbl;const val=el.dataset.val;
        const prev=prevMap[el.dataset.idx];
        let content=`${lbl}: ${val}/10`;
        if(prev)content+=`  ·  Prev: ${prev}/10`;
        tip.textContent=content;tip.style.display='block';
        /* K6: use getBoundingClientRect on the dot element for accurate position
           instead of SVG container left + cx attribute offset */
        const dotRect=el.getBoundingClientRect();
        const ax=dotRect.left+dotRect.width/2;
        const ay=dotRect.top-36+window.scrollY;
        tip.style.left=Math.min(ax,window.innerWidth-180)+'px';
        tip.style.top=ay+'px';
      };
      const hide=()=>{tip.style.display='none'};
      el.addEventListener('mouseenter',show);
      el.addEventListener('mouseleave',hide);
      el.addEventListener('touchstart',e=>{show(e);setTimeout(hide,2200);showChartTip(e.touches[0].clientX,e.touches[0].clientY,tip.textContent,true);},{passive:true});
    });
  });
  return s;
}

/* ── SCHEDULE TAB (E3 – Samsung calendar + swipeable panes) ── */
let TTD=today();
let _calYear=new Date().getFullYear();
let _calMonth=new Date().getMonth();
let _schPane=0; // 0=Today, 1=Tomorrow

function _calDot(dateStr){
  const dw=dow(dateStr);
  const fixed=gFixed().filter(b=>b.days.includes(dw));
  const sess=gSess().filter(s=>s.date===dateStr);
  return fixed.length>0||sess.length>0;
}

function _buildCalendar(){
  const mNames=['JANUARY','FEBRUARY','MARCH','APRIL','MAY','JUNE','JULY','AUGUST','SEPTEMBER','OCTOBER','NOVEMBER','DECEMBER'];
  const dHeaders=['M','T','W','T','F','S','S'];
  const todayStr=today();
  const firstDay=new Date(_calYear,_calMonth,1);
  // Monday-first: (getDay()+6)%7
  let startDow=(firstDay.getDay()+6)%7;
  const daysInMonth=new Date(_calYear,_calMonth+1,0).getDate();
  const daysInPrevMonth=new Date(_calYear,_calMonth,0).getDate();

  // Get week numbers (ISO)
  function getWeekNum(d){
    const dt=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
    const dayNum=dt.getUTCDay()||7;
    dt.setUTCDate(dt.getUTCDate()+4-dayNum);
    const yearStart=new Date(Date.UTC(dt.getUTCFullYear(),0,1));
    return Math.ceil((((dt-yearStart)/86400000)+1)/7);
  }

  let h=`<div class="sch-cal">
    <div class="sch-cal-hdr">
      <button class="sch-cal-nav" onclick="shiftCalMonth(-1)">‹</button>
      <div class="sch-cal-month">${mNames[_calMonth]} <span style="font-size:13px;font-weight:400;color:rgba(255,255,255,0.45)">${_calYear}</span></div>
      <button class="sch-cal-nav" onclick="shiftCalMonth(1)">›</button>
    </div>
    <div class="sch-cal-grid">
      <div class="sch-cal-wk-hdr"></div>`;
  // Day headers
  dHeaders.forEach((d,i)=>{
    const cls=i===5?'sat':i===6?'sun':'';
    h+=`<div class="sch-cal-day-hdr ${cls}">${d}</div>`;
  });

  // Build rows
  let dayNum=1-startDow; // may be negative (prev month days)
  for(let row=0;row<6;row++){
    // Week number for this row's Thursday
    const thursdayNum=dayNum+3;
    const thurDate=new Date(_calYear,_calMonth,thursdayNum);
    const wk=getWeekNum(thurDate);
    h+=`<div class="sch-cal-wk">${wk}</div>`;
    for(let col=0;col<7;col++,dayNum++){
      let cellDate,isOtherMonth=false;
      if(dayNum<1){
        cellDate=new Date(_calYear,_calMonth-1,daysInPrevMonth+dayNum);
        isOtherMonth=true;
      } else if(dayNum>daysInMonth){
        cellDate=new Date(_calYear,_calMonth+1,dayNum-daysInMonth);
        isOtherMonth=true;
      } else {
        cellDate=new Date(_calYear,_calMonth,dayNum);
      }
      const y=cellDate.getFullYear(),m=String(cellDate.getMonth()+1).padStart(2,'0'),d=String(cellDate.getDate()).padStart(2,'0');
      const dateStr=`${y}-${m}-${d}`;
      const isToday=dateStr===todayStr;
      const isSelected=dateStr===TTD;
      const colDow=col; // 0=Mon
      const isSat=col===5,isSun=col===6;
      const hasDot=!isOtherMonth&&_calDot(dateStr);
      const classes=['sch-cal-cell',isOtherMonth?'other-month':'',isSat?'sat':'',isSun?'sun':'',isToday?'today':'',isSelected?'selected':''].filter(Boolean).join(' ');
      h+=`<div class="${classes}" role="button" tabindex="0" aria-label="${cellDate.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}${isSelected?' (selected)':''}" onclick="selectCalDate('${escapeHTML(dateStr)}')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();selectCalDate('${escapeHTML(dateStr)}')}">
        <span class="sch-cal-date">${cellDate.getDate()}</span>
        ${hasDot?'<div class="sch-cal-dot"></div>':''}
      </div>`;
    }
    if(dayNum>daysInMonth&&row>=4)break;
  }
  h+=`</div></div>`;
  return h;
}

      const timeStr=b.start&&b.end?`${b.start} – ${b.end}`:'';

  h+=`<button class="btn btn-p btn-bl" style="margin-top:4px;margin-bottom:4px" onclick="showAddSess('${escapeHTML(dateStr)}')">+ Add Session</button>`;

function selectCalDate(dateStr){

     the calendar and selected date are never out of sync */

function shiftCalMonth(d){
  _calMonth+=d;
  if(_calMonth>11){_calMonth=0;_calYear++;}
  if(_calMonth<0){_calMonth=11;_calYear--;}
  renderNow();
}
function switchSchPane(n){
  _schPane=n;
  const track=document.getElementById('sch-pane-track');
  if(track){track.style.transition='transform 0.42s cubic-bezier(0.34,1.56,0.64,1)';track.style.transform=n===0?'translateX(0%)':'translateX(-50%)';}
  document.querySelectorAll('.sch-tab').forEach((t,i)=>t.classList.toggle('on',i===n));
  document.querySelectorAll('.sch-dot').forEach((d,i)=>d.classList.toggle('on',i===n));
}
function initSchSwipe(){
  const outer=document.getElementById('sch-pane-outer');
  const track=document.getElementById('sch-pane-track');
  if(!outer||!track)return;
  /* J4: prevent duplicate listeners when renderNow hits cache and skips DOM rebuild */
  if(outer._schSwipeInit)return;
  outer._schSwipeInit=true;
  // Set initial position without animation
  track.style.transition='none';
  track.style.transform=_schPane===0?'translateX(0%)':'translateX(-50%)';
  // Each pane = 50% of track = 100% of outer wrapper
  const panes=track.querySelectorAll('.sch-pane');
  panes.forEach(p=>{p.style.width=outer.offsetWidth+'px'});
  track.style.width=(outer.offsetWidth*2)+'px';
  let sx=0,sy=0,moved=0,dragging=false;
  /* Pointer Events — unified swipe for mouse, pen, and touch on schedule pane */
  function _schDown(e){
    const cx=e.clientX??e.touches?.[0]?.clientX;
    const cy=e.clientY??e.touches?.[0]?.clientY;
    if(cx==null)return;
    sx=cx;sy=cy;moved=0;dragging=true;
    track.style.transition='none';
    if(e.pointerId!=null)outer.setPointerCapture?.(e.pointerId);
  }
  function _schMove(e){
    if(!dragging)return;
    const cx=e.clientX??e.touches?.[0]?.clientX??sx;
    const cy=e.clientY??e.touches?.[0]?.clientY??sy;
    const dx=cx-sx;const dy=cy-sy;
    if(Math.abs(dy)>Math.abs(dx)&&Math.abs(moved)<6){dragging=false;return;}
    moved=dx;
    const base=_schPane===0?0:-outer.offsetWidth;
    const raw=base+dx;
    const clamped=Math.max(-outer.offsetWidth,Math.min(0,raw));
    track.style.transform=`translateX(${clamped}px)`;
  }
  function _schUp(){
    if(!dragging)return;dragging=false;
    if(moved<-44&&_schPane===0)_schPane=1;
    else if(moved>44&&_schPane===1)_schPane=0;
    track.style.transition='transform 0.42s cubic-bezier(0.34,1.56,0.64,1)';
    track.style.transform=_schPane===0?'translateX(0px)':`translateX(${-outer.offsetWidth}px)`;
    document.querySelectorAll('.sch-tab').forEach((t,i)=>t.classList.toggle('on',i===_schPane));
    document.querySelectorAll('.sch-dot').forEach((d,i)=>d.classList.toggle('on',i===_schPane));
  }

function calcFree(blocks){
  let s=0;
  blocks.forEach(b=>{
    if(!b.start||!b.end)return;
    const[sh,sm]=b.start.split(':').map(Number),[eh,em]=b.end.split(':').map(Number);
    let d=(eh*60+em)-(sh*60+sm);if(d<0)d+=1440;s+=d;
  });
  /* Use user-defined sleep window from getUserSleepWindow() — not hardcoded 22:00-05:00 */
  const {start:ws,end:we}=getUserSleepWindow();
  const[wsh,wsm]=ws.split(':').map(Number),[weh,wem]=we.split(':').map(Number);
  const wakeStart=wsh*60+wsm,wakeEnd=weh*60+wem;
  /* awake minutes = end-of-sleep to start-of-sleep (handles overnight) */
  const awakeMin=wakeEnd>wakeStart?wakeEnd-wakeStart:(1440-wakeStart+wakeEnd);
  return Math.max(0,awakeMin-s);
}

/* ── PASSCODE SYSTEM (F3/F4) — PBKDF2 with legacy SHA-256 fallback ── */
async function sha256(str){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function hashPasscode(str){
  const salt=crypto.getRandomValues(new Uint8Array(16));
  const saltHex=Array.from(salt).map(b=>b.toString(16).padStart(2,'0')).join('');
  const key=await crypto.subtle.importKey('raw',new TextEncoder().encode(str),'PBKDF2',false,['deriveBits']);
  const bits=await crypto.subtle.deriveBits({name:'PBKDF2',salt,iterations:100000,hash:'SHA-256'},key,256);
  const hashHex=Array.from(new Uint8Array(bits)).map(b=>b.toString(16).padStart(2,'0')).join('');
  return`pbkdf2:${saltHex}:${hashHex}`;
}
async function verifyPasscode(input,stored){
  if(!stored)return false;
  if(stored.startsWith('pbkdf2:')){
    const parts=stored.split(':');
    const saltHex=parts[1];const hashHex=parts[2];
    const salt=new Uint8Array(saltHex.match(/.{2}/g).map(b=>parseInt(b,16)));
    const key=await crypto.subtle.importKey('raw',new TextEncoder().encode(input),'PBKDF2',false,['deriveBits']);
    const bits=await crypto.subtle.deriveBits({name:'PBKDF2',salt,iterations:100000,hash:'SHA-256'},key,256);
    const newHash=Array.from(new Uint8Array(bits)).map(b=>b.toString(16).padStart(2,'0')).join('');
    return newHash===hashHex;
  }
  // Legacy SHA-256 fallback — upgrade hash on next successful login
  const legacy=await sha256(input);
  return legacy===stored;
}

const VERIFIED_KEY='pgc_verified_ts';

async function verifyPasscodes(action){
  const profs=gProfs();const needsPC=profs.filter(p=>p.passcodeHash);
  if(!needsPC.length){action();return}
  /* Skip modal if same profile set was verified within last 5 minutes */
  const _currentIds=needsPC.map(p=>p.id).sort().join(',');
  try{
    const _stored=JSON.parse(sessionStorage.getItem(VERIFIED_KEY)||'null');
    if(_stored&&_stored.ids===_currentIds&&Date.now()-_stored.ts<300000){
      action();return;
    }
  }catch(e){sessionStorage.removeItem(VERIFIED_KEY);}
  _pendingVerifyAction=action;
  /* Item 3: Use createPasswordInput with toggles */
  let fields=needsPC.map(p=>`<div class="fl"><label>${escapeHTML(p.name)}'s Passcode</label>${createPasswordInput(`pv_${escapeHTML(p.id)}`,'Enter passcode')}</div>`).join('');

      showToast(`❌ Wrong passcode for ${escapeHTML(p.name)}`);return;
    }
    // Upgrade legacy SHA-256 hashes to PBKDF2 transparently
    if(p.passcodeHash&&!p.passcodeHash.startsWith('pbkdf2:')){
      const upgraded=await hashPasscode(el.value||'');
      DB.set(K.PRF,gProfs().map(pp=>pp.id===p.id?{...pp,passcodeHash:upgraded}:pp));
    }
  }
  /* Cache successful verification — bound to verified profile IDs for 5 minutes */
  const _verifiedIds=needsPC.map(p=>p.id).sort().join(',');
  sessionStorage.setItem(VERIFIED_KEY,JSON.stringify({ts:Date.now(),ids:_verifiedIds}));
  closeM();
  // Execute the stored closure — safe because it retains its original scope
  if(_pendingVerifyAction){
    const fn=_pendingVerifyAction;
    _pendingVerifyAction=null;
    fn();
  }
}

        if(localProf?.passcodeHash&&importedProf.passcodeHash){
          if(localProf.passcodeHash!==importedProf.passcodeHash){

/* ── ENCRYPTED EXPORT (Audit: Plaintext export data) ── */
/* Derives a 256-bit AES-GCM key from a password using PBKDF2 */
async function _deriveExportKey(password,salt){
  const enc=new TextEncoder();
  const keyMat=await crypto.subtle.importKey('raw',enc.encode(password),{name:'PBKDF2'},false,['deriveKey']);
  return crypto.subtle.deriveKey(
    {name:'PBKDF2',salt,iterations:200000,hash:'SHA-256'},
    keyMat,{name:'AES-GCM',length:256},false,['encrypt','decrypt']
  );
}
/* Encrypts a JSON payload with AES-GCM; returns base64 string */
async function encryptExport(jsonStr,password){
  const enc=new TextEncoder();
  const salt=crypto.getRandomValues(new Uint8Array(16));
  const iv=crypto.getRandomValues(new Uint8Array(12));
  const key=await _deriveExportKey(password,salt);
  const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},key,enc.encode(jsonStr));
  /* Pack: magic(4) + salt(16) + iv(12) + ciphertext */
  const out=new Uint8Array(4+16+12+ct.byteLength);
  out.set([0x47,0x43,0x58,0x01]);/* GCX\x01 */
  out.set(salt,4);out.set(iv,20);
  out.set(new Uint8Array(ct),32);
  return btoa(String.fromCharCode(...out));
}
/* Decrypts an AES-GCM payload; returns JSON string or throws */
async function decryptExport(b64,password){
  const raw=Uint8Array.from(atob(b64),c=>c.charCodeAt(0));
  if(raw[0]!==0x47||raw[1]!==0x43||raw[2]!==0x58||raw[3]!==0x01)throw new Error('Not an encrypted export');
  const salt=raw.slice(4,20),iv=raw.slice(20,32),ct=raw.slice(32);
  const key=await _deriveExportKey(password,salt);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv},key,ct);
  return new TextDecoder().decode(pt);
}

  function _msDown(e){

  ms.addEventListener('pointermove',_msMove,{passive:false});
  ms.addEventListener('pointerup',_msUp);
  ms.addEventListener('pointercancel',_msUp);
  if(!window.PointerEvent){
    ms.addEventListener('touchstart',_msDown,{passive:true});
    ms.addEventListener('touchmove',_msMove,{passive:false});
    ms.addEventListener('touchend',_msUp);
  }
}

/* ── ROUTER ── */
let CUR='home';
/* Per-tab HTML cache — avoids redundant DOM thrash when content hasn't changed */
const _renderCache={};
/* Invalidate cache for a tab (or all) when underlying data changes */
function _invalidateCache(tab){if(tab){delete _renderCache[tab];}else{Object.keys(_renderCache).forEach(k=>delete _renderCache[k]);}}
/* Debounce guard for rapid successive renderNow() calls */
let _renderPending=false;
function renderNow(){
  if(SPHAF){cancelAnimationFrame(SPHAF);SPHAF=null}
  _liquidRings.forEach(lr=>lr.stop());_liquidRings.clear();
  /* Item 17: Stop old avatar animator before re-render */
  if(avatarAnimator){avatarAnimator.stop();avatarAnimator=null;}
  const c=document.getElementById('cnt');
  /* Build only what's needed for the current tab */
  const tabFns={home:tHome,log:tLog,analytics:tAnalytics,schedule:tSchedule,settings:tSettings};
  const html=(tabFns[CUR]||tHome)();
  /* Skip DOM update entirely when rendered HTML is identical to last render */
  if(_renderCache[CUR]===html){
    /* Data unchanged — still re-run post-render hooks (rings, scroll, etc.) */
  } else {
    _renderCache[CUR]=html;
    /* Use createContextualFragment for more efficient DOM insertion (avoids full reflow cycle) */
    const range=document.createRange();
    range.selectNodeContents(c);
    range.deleteContents();
    c.appendChild(range.createContextualFragment(html));
  }
  c.scrollTop=0;
  // Hide FAB by default
  const fab=document.getElementById('fab-log');
  if(fab){fab.style.opacity='0';fab.style.pointerEvents='none';fab.style.transform='scale(0.8)'}

  requestAnimationFrame(()=>{
    revealElements();
    animateRings();
    initScrollAnimations();
    if(CUR==='schedule'){
      initSchSwipe();
    }
    if(CUR==='home'){
      const pid=gActive();const pr=aProf();const tlog=logOn(pid,today());
      const sc=tlog?.scores||{};const map={};gSph(pid).forEach(s=>{map[s.id]=sc[s.id]?.value||0});
      setTimeout(()=>initSphere(map,pr.color,'hero-sphere-cv'),80);

      /* Item 5 (v9 fix): Robust initAvatarAnimator with retry — replaces fixed 200ms timeout */
      initAvatarAnimator();

      // Render duel charts after DOM is ready
      setTimeout(()=>{
        const profs=gProfs();
        if(profs.length>=2){
          const fid=profs.find(p=>p.id!==pid)?.id;
          const sharedSph=gSph(pid).filter(s=>gSph(fid).some(x=>x.id===s.id));
          const fTlog=logOn(fid,today());
          const todayEntries={};
          todayEntries[pid]=tlog;todayEntries[fid]=fTlog;
          renderDuelChart('duel-today-chart',todayEntries,profs,sharedSph,'Today\'s Duel');
          /* FIX Issue 4: local date for yesterday */
          const yesterday=new Date();yesterday.setDate(yesterday.getDate()-1);const yiso=`${yesterday.getFullYear()}-${String(yesterday.getMonth()+1).padStart(2,'0')}-${String(yesterday.getDate()).padStart(2,'0')}`;
          const yEntries={};yEntries[pid]=logOn(pid,yiso);yEntries[fid]=logOn(fid,yiso);
          renderDuelChart('duel-yesterday-chart',yEntries,profs,sharedSph,'Yesterday\'s Duel');
        }
        // Sparklines
        [7,14,30].forEach(days=>{
          const cv=document.getElementById(`sk_${days}`);
          if(!cv)return;
          const dlogs=[...logsIn(pid,days)].sort((a,b)=>a.date.localeCompare(b.date));
          const sph=gSph(pid);
          /* Item 16: filter null values from sparkline */
          const vals=dlogs.map(l=>{const v=sph.map(s=>l.scores?.[s.id]?.value).filter(x=>x!=null&&x!==null);return v.length?v.reduce((a,b)=>a+b,0)/v.length:0});
          renderSparkline(cv,vals,pr.color);
        });
      },120);
    }
  });
}
/* ── FIX Issue 12: Single delegated input listener on #cnt for tLog slider and notes ── */
(function(){
  const cnt=document.getElementById('cnt');
  if(!cnt)return;

function goTab(tab){
  /* D2: skip re-render when tapping the already-active tab; log always re-initialises state */
  if(tab===CUR&&tab!=='log')return;
  CUR=tab;
  _invalidateCache(tab); /* Fresh render on each explicit tab switch */

  /* FIX Image 2: remove any orphaned modal sheet (#pgcm) immediately on tab switch */
  const orphanModal=document.getElementById('pgcm');
  if(orphanModal){orphanModal.remove();}

  /* FIX Image 3: hide pip-bubble and drain queue on tab switch to prevent it persisting */
  const _pb=document.getElementById('pip-bubble');
  if(_pb){_pb.style.display='none';}
  clearTimeout(window._bubbleTimeout);
  _pipMsgQueue.length=0;
  _pipMsgRunning=false;

  document.querySelectorAll('.tb').forEach(b=>b.classList.toggle('on',b.dataset.t===tab));
  if(tab==='log'){LS.date=today();LS.scores={};LS.notes={}}
  // V9-4: manage idle watch lifecycle
  if(tab==='home'){
    startIdleReactWatch();
  } else {
    clearTimeout(_idleReactTimeout);
    _idleReactTimeout=null;
  }
  renderNow();
}

/* ── PWA ── */
/* v10-3-3: All PWA bootstrap now uses static companion files.
   W1 — manifest served from ./manifest.webmanifest (no Blob)
   W2 — service worker registered from ./sw.js (no Blob)
   W3 — apple-touch-icon and startup-image are real PNGs in <head> (no canvas)
   W4 — navigator.storage.persist() called in bootDB() (unchanged)
   W5 — iOS install banner shown when not in standalone mode (unchanged) */
function initPWA(){
  /* W2: iOS detection — on iPhone/iPad in browser mode, skip SW registration
     (iOS Safari does not support file-based SW from file:// but does from HTTPS)
     and show the install banner so the user installs correctly first. */
  const _isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
  const _isStandalone=window.navigator.standalone===true;

  if(_isIOS&&!_isStandalone){
    /* iOS in browser tab — show install guidance, do not attempt SW */
    _showInstallBanner();
    return;
  }

  /* W2: Register the real same-origin sw.js file — no Blob wrapper.
     Works on Chrome, Firefox, Edge, and iOS Safari in standalone (Home Screen) mode.
     Falls back silently on non-HTTPS / private-mode contexts. */
  if(!('serviceWorker' in navigator))return;
  navigator.serviceWorker.register('./sw.js',{scope:'./'})
    .catch(()=>{
      /* SW blocked (private mode, non-HTTPS, or file://) — PWA runs without offline support */
      if(!sessionStorage.getItem('pgc_sw_warned')){
        sessionStorage.setItem('pgc_sw_warned','1');
        setTimeout(()=>showToast('ℹ️ Offline mode unavailable on this browser',3500),2000);
      }
    });
}

/* W5: Install banner — shown once to iPhone/iPad Safari users not in standalone mode.
   Dismissed state stored in localStorage so it survives page reloads. */
function _showInstallBanner(){
  try{if(localStorage.getItem('pgc_install_dismissed')==='1')return;}catch(e){}
  const banner=document.getElementById('ios-install-banner');
  if(!banner)return;
  // Delay so it doesn't compete with app boot toasts
  setTimeout(()=>banner.classList.add('show'),2800);
}
function dismissInstallBanner(){
  const banner=document.getElementById('ios-install-banner');
  if(banner)banner.classList.remove('show');
  try{localStorage.setItem('pgc_install_dismissed','1');}catch(e){}
}

    const today_iso=today();
    const currentLeadCount=sharedIds.filter(id=>{

    }).length;

        triggerAvatarEvent('leaderboardTrail');

        triggerAvatarEvent('leaderboardLead');
      }
    }
  });
  // Issue 8 FIX: guard against re-registration across re-inits; store id for cleanup
  if(!window._leadPollId){
    window._leadPollId=setInterval(()=>{
      if(document.hidden||CUR!=='home')return;
      const pid=gActive();const profs=gProfs();
      if(profs.length<2)return;
      const fid=profs.find(p=>p.id!==pid)?.id;if(!fid)return;
      const sharedIds=gSph(pid).map(s=>s.id).filter(id=>gSph(fid).some(s=>s.id===id));
      if(!sharedIds.length)return;
      const today_iso=today();
      const newCount=sharedIds.filter(id=>{
        const myLog=logOn(pid,today_iso);const fLog=logOn(fid,today_iso);
        return(myLog?.scores?.[id]?.value??0)>(fLog?.scores?.[id]?.value??0);
      }).length;
      if(_prevLeadCount>=0&&newCount!==_prevLeadCount){
        const friendName=profs.find(p=>p.id===fid)?.name||'Friend';
        if(newCount<_prevLeadCount){
          const behind=sharedIds.length-newCount;
          showDI({icon:'⚡',iconType:'rival',title:`${friendName} just took the lead`,sub:`Ahead in ${behind} sphere${behind!==1?'s':''} — time to push`,actionFn:()=>goTab('analytics'),ms:4500,tapLabel:'View →'});
          triggerAvatarEvent('leaderboardTrail');
          pipSay(`${friendName} just took the lead! 💪`,2200);
        } else {
          showDI({icon:'🥇',iconType:'trophy',title:'You\'re back on top!',sub:`Leading in ${newCount} sphere${newCount!==1?'s':''}`,actionFn:()=>goTab('analytics'),ms:4000,tapLabel:'Open →',pulse:true});

          pipSay(`You're back on top! 🥇`,2000);

        _savePrevLeadCount(newCount);
      }
    },60000);
    window.addEventListener('pagehide',()=>{clearInterval(window._leadPollId);window._leadPollId=null;},{once:true});
  }
  // Set dynamic day number in schedule nav icon
  (function(){const d=new Date().getDate();const el=document.getElementById('sch-day-num');if(el)el.textContent=d;})();
  // Pause/resume liquid ring animations on tab visibility change
  document.addEventListener('visibilitychange',()=>{
    if(document.hidden){
      _liquidRings.forEach(lr=>lr.stop());
      /* E3: also pause particle RAF when tab is hidden */
      if(_particleRAF){cancelAnimationFrame(_particleRAF);_particleRAF=null;}
      /* A4: pause Three.js sphere animation when tab hidden */
      if(_three.af){cancelAnimationFrame(_three.af);_three.af=null;}
      if(SPHAF){cancelAnimationFrame(SPHAF);SPHAF=null;}
    } else {
      _liquidRings.forEach(lr=>{if(!lr._running){lr._running=true;lr.animate();}});
      /* E3: resume particles only in dark mode */
      if(!_particleRAF&&document.documentElement.dataset.theme!=='light'){initParticles();}

    }
  });
});
