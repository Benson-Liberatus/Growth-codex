<html lang="en" data-theme="dark">
<head>

<title>Growth Codex v10.3</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%;-webkit-text-size-adjust:100%}
body{min-height:100vh;height:100%;background:var(--bg);color:var(--cream);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;font-size:15px;overflow-y:auto;transition:background 0.4s,color 0.4s}
:root{
  --bg:#06040c;--bg2:#0c0916;
  --glass:rgba(255,255,255,0.055);--glass-border:rgba(255,255,255,0.09);
  --glass-top:rgba(255,255,255,0.18);
  --gold:#d4a843;--gold-lt:#e8c870;--gold-dim:rgba(212,168,67,0.15);
  --purple:#7c4fc0;--purple-lt:#a878e8;
  --cream:#ede3c8;--cream2:rgba(237,227,200,0.55);--cream3:rgba(237,227,200,0.28);
  --red:#d44060;--green:#38a06c;
  --tab-h:72px;--r:22px;
  --spring:cubic-bezier(0.34,1.56,0.64,1);--ease:cubic-bezier(0.4,0,0.2,1);
  --light-pos-x:50%;--light-pos-y:50%;
}
[data-theme="light"]{
  --bg:#f0ebff;--bg2:#e4daff;
  --glass:rgba(255,255,255,0.72);--glass-border:rgba(124,79,192,0.18);
  --glass-top:rgba(255,255,255,0.95);
  --gold:#9a7228;--gold-lt:#c4922c;--gold-dim:rgba(154,114,40,0.1);
  --purple:#5e2fa0;--purple-lt:#7844c4;
  --cream:#1a0d3e;--cream2:rgba(26,13,62,0.7);--cream3:rgba(26,13,62,0.42);
  --red:#b53050;--green:#1e8a58;
}
[data-theme="light"] body{background:linear-gradient(140deg,#f0ebff 0%,#e8dfff 50%,#fff8ec 100%)}
[data-theme="light"] #gl-canvas,[data-theme="light"] #particle-canvas,[data-theme="light"] .orb{display:none}
#gl-canvas,#particle-canvas{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:0}
#confetti-canvas{position:fixed;inset:0;width:100%;height:100%;z-index:500;pointer-events:none;display:none}
.orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0;will-change:transform}
.orb1{width:340px;height:340px;top:-110px;left:-110px;background:radial-gradient(circle,rgba(124,79,192,0.45) 0%,transparent 68%);animation:orbA 9s ease-in-out infinite}
.orb2{width:280px;height:280px;bottom:100px;right:-90px;background:radial-gradient(circle,rgba(212,168,67,0.32) 0%,transparent 68%);animation:orbA 11s ease-in-out infinite reverse 1s}
.orb3{width:220px;height:220px;top:45%;left:55%;background:radial-gradient(circle,rgba(100,60,180,0.2) 0%,transparent 68%);animation:orbA 14s ease-in-out infinite 3s}
@keyframes orbA{0%,100%{transform:translate(0,0)scale(1)}30%{transform:translate(20px,-24px)scale(1.07)}65%{transform:translate(-14px,18px)scale(0.93)}}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;position:relative;z-index:2}
#hdr{padding:calc(env(safe-area-inset-top,0px)+14px) 18px 10px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;position:relative;z-index:10}
.hdr-mark{font-size:28px;letter-spacing:-0.8px;font-weight:900;color:var(--gold);display:flex;align-items:center;gap:8px;line-height:1}
.hdr-mark::before{content:'⚜';font-size:18px;color:rgba(212,168,67,0.7);filter:drop-shadow(0 0 6px rgba(212,168,67,0.5))}
.hdr-sub-title{font-size:11px;letter-spacing:1.8px;text-transform:uppercase;color:rgba(212,168,67,0.42);font-weight:600;display:block;margin-top:1px}
#prof-sw{display:flex;background:rgba(255,255,255,0.07);border:1px solid var(--glass-border);border-radius:26px;padding:3px;backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);gap:2px}
.pp{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:22px;font-size:12px;font-weight:700;cursor:pointer;color:var(--cream3);border:none;background:none;font-family:inherit;transition:all 0.28s var(--spring)}
.pp.on{background:rgba(124,79,192,0.45);color:var(--cream);box-shadow:0 2px 14px rgba(124,79,192,0.35),inset 0 1px 0 rgba(255,255,255,0.15)}
.pp-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
#cnt{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 16px calc(env(safe-area-inset-bottom,0px) + 80px);-webkit-overflow-scrolling:touch;touch-action:pan-y;position:relative;z-index:1}
#cnt::-webkit-scrollbar{display:none}#cnt{scrollbar-width:none;-ms-overflow-style:none}
/* ── CARD with light reflection (A2) ── */
/* Item 12: Premium polish - solid gradient background, no heavy blur */
.card{background:linear-gradient(145deg,rgba(20,15,35,0.85),rgba(10,5,20,0.95));border:1px solid rgba(212,168,67,0.25);box-shadow:0 8px 20px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.05);border-radius:var(--r);padding:16px;margin-bottom:11px;backdrop-filter:none;position:relative;overflow:hidden;opacity:0;transform:translateY(16px)scale(0.985);transition:opacity 0.38s var(--ease),transform 0.42s var(--spring);will-change:transform}
[data-theme="light"] .card{background:rgba(255,255,255,0.82);border:1px solid rgba(124,79,192,0.18);box-shadow:0 4px 16px rgba(124,79,192,0.08),inset 0 1px 0 rgba(255,255,255,0.9)}
.card.vis{opacity:1;transform:none}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--glass-top),transparent);opacity:0.45;pointer-events:none}
.card::after{content:'';position:absolute;inset:0;pointer-events:none;background:radial-gradient(circle at var(--light-pos-x) var(--light-pos-y),rgba(255,255,255,0.13) 0%,transparent 70%);opacity:0.5;transition:opacity 0.3s;z-index:0}
.card-shimmer::before{animation:shimPass 5s ease infinite 2s}
@keyframes shimPass{0%{left:-60%}100%{left:160%}}@media(prefers-reduced-motion:reduce){.card,.debrief-card,.lsc,.sp,.sparkline-card{backdrop-filter:none!important;-webkit-backdrop-filter:none!important;animation:none!important;transition:none!important}}
/* A2 – fallback shimmer for non-hover devices */
@keyframes fallbackLightX{0%{--light-pos-x:20%}25%{--light-pos-x:80%}50%{--light-pos-x:60%}75%{--light-pos-x:30%}100%{--light-pos-x:20%}}
@keyframes fallbackLightY{0%{--light-pos-y:20%}33%{--light-pos-y:70%}66%{--light-pos-y:40%}100%{--light-pos-y:20%}}
body.fallback-shimmer{animation:fallbackLightX 8s ease-in-out infinite,fallbackLightY 11s ease-in-out infinite}
@supports not (animation-timeline:scroll()){
  body.fallback-shimmer .card::after{animation:fbGlow 9s ease-in-out infinite}
}
@keyframes fbGlow{0%,100%{background:radial-gradient(circle at 20% 20%,rgba(255,255,255,0.13) 0%,transparent 70%)}33%{background:radial-gradient(circle at 75% 30%,rgba(255,255,255,0.13) 0%,transparent 70%)}66%{background:radial-gradient(circle at 45% 75%,rgba(255,255,255,0.13) 0%,transparent 70%)}}
.ct{font-size:10px;letter-spacing:1.4px;text-transform:uppercase;color:rgba(212,168,67,0.68);font-weight:700;margin-bottom:13px;position:relative;z-index:1}
.hero{border-radius:26px;padding:22px 20px 20px;margin-bottom:11px;position:relative;overflow:hidden;min-height:178px;display:flex;flex-direction:column;justify-content:space-between;opacity:0;transform:translateY(16px)scale(0.985);transition:opacity 0.38s var(--ease),transform 0.42s var(--spring)}
.hero.vis{opacity:1;transform:none}
.hero::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent 30%,rgba(0,0,0,0.28));pointer-events:none;z-index:1}
#hero-sphere-cv{position:absolute;right:0;top:0;width:200px;height:100%;z-index:0;opacity:0.4;cursor:grab;transition:transform 0.1s,opacity 0.1s;will-change:transform,opacity}
.hero-top{position:relative;z-index:2}
.hero-greet{font-size:11px;letter-spacing:0.8px;color:rgba(255,255,255,0.55);font-weight:500;text-transform:uppercase;margin-bottom:3px}
.hero-name{font-size:30px;font-weight:800;color:#fff;letter-spacing:-0.8px;line-height:1.05}
.hero-bot{display:flex;align-items:flex-end;justify-content:space-between;position:relative;z-index:2}
.hero-left{display:flex;align-items:center;gap:8px}
.streak-chip{display:flex;align-items:center;gap:6px;background:rgba(0,0,0,0.28);border-radius:14px;padding:7px 12px;backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1)}
.streak-chip.at-risk{border-color:rgba(212,64,96,0.7)!important;animation:sPulse 1.6s ease-in-out infinite}
.streak-chip.at-risk .sc-lbl::after{content:' ⚠️';font-size:9px}
@keyframes sPulse{0%,100%{box-shadow:0 0 0 0 rgba(212,64,96,0.45)}50%{box-shadow:0 0 0 10px rgba(212,64,96,0)}}
/* I3 – shield badge animation */
.shield-badge{display:inline-block;animation:shieldPop 0.5s var(--spring) both}
@keyframes shieldPop{0%{transform:scale(0) rotate(-20deg);opacity:0}60%{transform:scale(1.3) rotate(5deg)}100%{transform:scale(1) rotate(0deg);opacity:1}}
.streak-chip.streak-saved .shield-badge{animation:shieldGlow 2s ease-in-out infinite 0.6s}
@keyframes shieldGlow{0%,100%{filter:drop-shadow(0 0 3px rgba(212,168,67,0.4))}50%{filter:drop-shadow(0 0 10px rgba(212,168,67,0.85))}}
.sc-num{font-size:22px;font-weight:900;color:#fff;line-height:1}
.sc-lbl{font-size:9px;color:rgba(255,255,255,0.6);line-height:1.35;font-weight:600}
.hero-right{text-align:right}
.big-score{font-size:56px;font-weight:900;color:#fff;line-height:1;letter-spacing:-3px;font-variant-numeric:tabular-nums}
.big-score-sub{font-size:10px;color:rgba(255,255,255,0.5);margin-top:1px}
.score-badge{display:inline-block;padding:2px 8px;border-radius:7px;font-size:10px;font-weight:700;background:rgba(255,255,255,0.15);color:rgba(255,255,255,0.85);margin-top:3px}
/* ── LIQUID RINGS (A1) ── */
.rings-g{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;position:relative;z-index:1}
/* Item 12: Crisp ring containers */
.ring-c{display:flex;flex-direction:column;align-items:center;gap:4px;padding:11px 6px 9px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:18px;opacity:0;transform:translateY(16px);transition:opacity 0.38s var(--ease),transform 0.42s var(--spring)}
.ring-c.vis{opacity:1;transform:none}
.ring-c:active{background:rgba(255,255,255,0.08)}
.ring-w{position:relative;display:flex;align-items:center;justify-content:center;width:62px;height:62px;flex-shrink:0}
.ring-sc{position:absolute;font-size:15px;font-weight:900;line-height:1;font-variant-numeric:tabular-nums;pointer-events:none;color:#fff!important;text-shadow:0 2px 4px rgba(0,0,0,0.3)}
.ring-ic{font-size:13px;line-height:1}
.ring-nm{font-size:8.5px;color:var(--cream3);text-align:center;letter-spacing:0.2px;font-weight:500;max-width:60px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.stat-row{display:flex;gap:8px;margin-bottom:11px}
.sp{flex:1;background:var(--glass);border:1px solid var(--glass-border);border-radius:16px;padding:13px 10px;text-align:center;backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);opacity:0;transform:translateY(12px);transition:opacity 0.38s var(--ease),transform 0.42s var(--spring)}
.sp.vis{opacity:1;transform:none}
.sp-v{font-size:26px;font-weight:900;color:var(--gold);line-height:1;font-variant-numeric:tabular-nums}
.sp-l{font-size:9px;color:var(--cream3);margin-top:3px;letter-spacing:0.3px;font-weight:500}
.debrief-card{background:linear-gradient(135deg,rgba(124,79,192,0.2) 0%,rgba(212,168,67,0.11) 100%);border:1px solid rgba(212,168,67,0.22);border-radius:var(--r);padding:16px;margin-bottom:11px;backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);position:relative;overflow:hidden;opacity:0;transform:translateY(16px);transition:opacity 0.38s var(--ease),transform 0.42s var(--spring)}
.debrief-card.vis{opacity:1;transform:none}
.debrief-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(212,168,67,0.5),transparent)}
.db-head{font-size:10px;letter-spacing:1.4px;text-transform:uppercase;color:rgba(212,168,67,0.7);font-weight:700;margin-bottom:11px}
.db-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.db-stat{background:rgba(255,255,255,0.04);border-radius:13px;padding:10px 12px}
.db-v{font-size:22px;font-weight:900;color:var(--cream);line-height:1;font-variant-numeric:tabular-nums}
.db-l{font-size:9.5px;color:var(--cream3);margin-top:2px;font-weight:500}
.db-delta{font-size:11px;font-weight:700;padding:2px 7px;border-radius:8px;display:inline-block;margin-top:4px}
.db-delta.up{background:rgba(56,160,108,0.15);color:#5cce8a}
.db-delta.dn{background:rgba(212,64,96,0.15);color:#e06080}
.db-tip{font-size:12px;color:var(--cream2);line-height:1.55;padding:9px 12px;background:rgba(255,255,255,0.04);border-radius:11px;border-left:3px solid var(--gold)}
.ic{display:flex;align-items:flex-start;padding:12px 14px;border-radius:14px;margin-bottom:8px;border:1px solid;opacity:0;transform:translateY(10px);transition:opacity 0.36s var(--ease),transform 0.4s var(--spring)}
.ic.vis{opacity:1;transform:none}
.ic.strength{background:rgba(56,160,108,0.1);border-color:rgba(56,160,108,0.22)}
.ic.weakness{background:rgba(212,64,96,0.1);border-color:rgba(212,64,96,0.22)}
.ic.momentum{background:rgba(56,160,108,0.08);border-color:rgba(56,160,108,0.18)}
.ic.warning{background:rgba(212,140,40,0.1);border-color:rgba(212,140,40,0.22)}
.ic.achievement{background:rgba(212,168,67,0.1);border-color:rgba(212,168,67,0.22)}
.ic.info{background:rgba(124,79,192,0.1);border-color:rgba(124,79,192,0.22)}
.ic-t{font-size:12px;font-weight:700;color:var(--cream);margin-bottom:2px}
.ic-b{font-size:12px;color:var(--cream2);line-height:1.5}
.sparkline-card{all:unset;display:block;width:100%;box-sizing:border-box;cursor:pointer}.hdr-sub-a{all:unset;cursor:pointer;display:inline}
.lsc{padding:14px 16px;border-radius:20px;margin-bottom:9px;background:var(--glass);border:1px solid var(--glass-border);backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);position:relative;overflow:hidden;opacity:0;transform:translateY(14px);transition:opacity 0.36s var(--ease),transform 0.4s var(--spring)}
.lsc.vis{opacity:1;transform:none}
.lsc::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--glass-top),transparent);opacity:0.35}
.ls-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.ls-lft{display:flex;align-items:center;gap:9px}
.ls-ico{font-size:22px}
.ls-nm{font-size:14px;font-weight:600;color:var(--cream)}
.ls-val{font-size:34px;font-weight:900;line-height:1;transition:color 0.25s var(--ease);font-variant-numeric:tabular-nums}
.pb-badge{font-size:9px;font-weight:700;color:var(--gold);background:var(--gold-dim);padding:1px 6px;border-radius:6px;margin-left:6px;animation:popIn 0.4s var(--spring) both}
@keyframes popIn{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:5px;border-radius:3px;outline:none;cursor:pointer;margin-bottom:9px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:26px;height:26px;border-radius:50%;background:#fff;box-shadow:0 2px 12px rgba(0,0,0,0.45);cursor:pointer;transition:transform 0.18s var(--spring)}
input[type=range]:active::-webkit-slider-thumb{transform:scale(1.3)}
.ls-notes{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.09);border-radius:11px;color:var(--cream);padding:8px 12px;font-size:12.5px;resize:none;font-family:inherit}
.ls-notes:focus{outline:none;border-color:rgba(124,79,192,0.5)}
.ls-notes::placeholder{color:rgba(237,227,200,0.22)}
input[type=text],input[type=date],input[type=time],select{background:rgba(255,255,255,0.07);border:1px solid var(--glass-border);border-radius:12px;color:var(--cream);padding:12px 14px;font-size:14px;font-family:inherit;width:100%;-webkit-appearance:none;appearance:none}
input[type=text]:focus,input[type=date]:focus,input[type=time]:focus,select:focus{outline:none;border-color:rgba(124,79,192,0.55);background:rgba(255,255,255,0.09)}
input[type=text]::placeholder{color:rgba(237,227,200,0.22)}
select option{background:#130f22}
input[type=color]{background:rgba(255,255,255,0.07);border:1px solid var(--glass-border);border-radius:12px;padding:6px;width:100%;height:46px;cursor:pointer}
.fl{margin-bottom:12px}
.fl label{font-size:10.5px;letter-spacing:0.8px;text-transform:uppercase;color:rgba(212,168,67,0.62);margin-bottom:6px;display:block;font-weight:700}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{padding:14px 22px;border-radius:16px;border:none;cursor:pointer;font-size:14px;font-weight:700;letter-spacing:0.2px;font-family:inherit;transition:transform 0.16s var(--spring),opacity 0.16s,box-shadow 0.2s}
.btn:active{transform:scale(0.95);opacity:0.87}
.btn-p{background:linear-gradient(135deg,#5a3a9a,#9060d0);color:#fff;box-shadow:0 4px 18px rgba(90,58,154,0.38)}
.btn-g{background:linear-gradient(135deg,#9a7228,var(--gold));color:#06040c;box-shadow:0 4px 18px rgba(212,168,67,0.32)}
.btn-d{background:rgba(212,64,96,0.14);color:#e06080;border:1px solid rgba(212,64,96,0.28)}
.btn-m{background:rgba(255,255,255,0.07);color:var(--cream2);border:1px solid var(--glass-border)}
.btn-bl{width:100%;text-align:center}
.btn-sm{padding:7px 14px;font-size:12px;border-radius:10px}
.dnav{display:flex;align-items:center;gap:6px;margin-bottom:14px;background:var(--glass);border:1px solid var(--glass-border);border-radius:14px;padding:3px}
.dnav button{background:none;border:none;color:rgba(212,168,67,0.75);font-size:20px;padding:8px 14px;cursor:pointer;border-radius:10px;transition:background 0.15s;flex-shrink:0}
.dnav button:active{background:rgba(255,255,255,0.08)}
.dnav span{flex:1;text-align:center;font-size:13px;color:var(--cream);font-weight:600}
.tt-slot{display:flex;gap:10px;margin-bottom:7px;align-items:flex-start}
.tt-t{font-size:9.5px;color:rgba(237,227,200,0.32);min-width:40px;padding-top:12px;text-align:right;flex-shrink:0;font-variant-numeric:tabular-nums;line-height:1.5}
.tt-b{flex:1;padding:10px 13px;border-radius:13px;border-left:3px solid;position:relative;backdrop-filter:blur(8px)}
.tt-n{font-size:13px;font-weight:600;color:var(--cream)}
.tt-m{font-size:10px;color:rgba(237,227,200,0.45);margin-top:2px;text-transform:uppercase;letter-spacing:0.3px}
.tt-del{position:absolute;right:8px;top:8px;background:none;border:none;color:rgba(212,64,96,0.45);cursor:pointer;font-size:13px;padding:2px}
.tt-del:active{color:var(--red)}
.cat-routine{border-color:#5568bb;background:rgba(85,104,187,0.11)}
.cat-prayer{border-color:var(--gold);background:rgba(212,168,67,0.09)}
.cat-meal{border-color:#996633;background:rgba(153,102,51,0.1)}
.cat-class{border-color:var(--purple-lt);background:rgba(168,120,232,0.1)}
.cat-study{border-color:var(--green);background:rgba(56,160,108,0.1)}
.cat-exercise{border-color:#cc5533;background:rgba(204,85,51,0.09)}
.cat-sleep{border-color:#334466;background:rgba(51,68,102,0.11)}
.cat-other{border-color:#776655;background:rgba(119,102,85,0.08)}
/* ── BOTTOM BAR — Item 7: Floating pill redesign ── */
#tbar{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + 8px);left:50%;transform:translateX(-50%);right:auto;width:fit-content;max-width:calc(100vw - 24px);overflow-x:auto;height:auto;padding:6px 12px;display:flex;align-items:center;background:rgba(10,5,20,0.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:none;border-radius:40px;box-shadow:0 8px 24px rgba(0,0,0,0.4),0 0 0 1px rgba(212,168,67,0.15);z-index:100;transition:all 0.3s var(--spring)}
#tbar.nav-collapsed{padding:4px 8px}
#tbar.nav-collapsed .tb-label{font-size:0;opacity:0;height:0;overflow:hidden}.tb-label{white-space:nowrap}
.tb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;color:rgba(237,227,200,0.28);cursor:pointer;font-size:7.5px;letter-spacing:0.5px;text-transform:uppercase;font-weight:700;padding:6px 12px;font-family:inherit;transition:color 0.22s,background 0.2s;border-radius:30px;position:relative}
.tb-icon{width:26px;height:26px;display:flex;align-items:center;justify-content:center;transition:transform 0.3s var(--spring)}
.tb-label{transition:font-size 0.3s,opacity 0.3s;line-height:1}
.tb.on{color:var(--gold);background:rgba(212,168,67,0.15)}
.tb.on .tb-icon{transform:scale(1.18) translateY(-2px)}
.tb-bar{width:20px;height:3px;border-radius:2px;background:var(--gold);margin-top:1px;opacity:0;transform:scaleX(0);transition:opacity 0.22s,transform 0.3s var(--spring)}
.tb.on .tb-bar{opacity:1;transform:scaleX(1)}
/* ── FAB (A3) ── */
#fab-log{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + var(--tab-h) + 16px);right:18px;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--gold));border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 24px rgba(124,79,192,0.5);z-index:99;opacity:0;transform:scale(0.8);transition:opacity 0.3s,transform 0.3s var(--spring),box-shadow 0.2s;will-change:opacity,transform}
#fab-log:active{transform:scale(0.92)}
/* ── DYNAMIC ISLAND (A7) — truly dynamic width pill ── */
#dynamic-island{
  position:fixed;top:calc(env(safe-area-inset-top,0px) + 12px);left:50%;
  transform:translateX(-50%) translateY(-140%) scale(0.82);
  background:rgba(10,6,20,0.96);
  backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);
  border-radius:50px;padding:0;color:var(--cream);
  box-shadow:0 12px 32px rgba(0,0,0,0.55),0 0 0 1px rgba(255,255,255,0.09),inset 0 1px 0 rgba(255,255,255,0.12);
  transition:transform 0.52s cubic-bezier(0.34,1.56,0.64,1),opacity 0.35s ease,max-width 0.3s ease;
  z-index:1000;cursor:pointer;
  width:fit-content;width:-webkit-fit-content;
  max-width:calc(100vw - 32px);
  opacity:0;pointer-events:none;overflow:hidden;white-space:nowrap;
}
#dynamic-island.show{transform:translateX(-50%) translateY(0) scale(1);opacity:1;pointer-events:auto}
#dynamic-island.hiding{transform:translateX(-50%) translateY(-70%) scale(0.88);opacity:0}
.di-inner{display:inline-flex;align-items:center;gap:10px;padding:10px 16px 10px 12px}
.di-inner.di-compact{padding:10px 18px 10px 14px;gap:9px}
.di-icon-wrap{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1)}
.di-icon-wrap.di-success{background:rgba(56,160,108,0.22);border-color:rgba(56,160,108,0.35)}
.di-icon-wrap.di-warning{background:rgba(212,168,67,0.22);border-color:rgba(212,168,67,0.35)}
.di-icon-wrap.di-info{background:rgba(124,79,192,0.22);border-color:rgba(124,79,192,0.35)}
.di-icon-wrap.di-trophy{background:rgba(212,168,67,0.22);border-color:rgba(212,168,67,0.35)}
.di-icon-wrap.di-streak{background:rgba(255,120,60,0.22);border-color:rgba(255,120,60,0.35)}
.di-icon-wrap.di-rival{background:rgba(212,64,96,0.22);border-color:rgba(212,64,96,0.35)}
.di-text{flex:1;min-width:0}
.di-title{font-size:12.5px;font-weight:700;color:#fff;line-height:1.2;white-space:nowrap}
.di-sub{font-size:10px;color:rgba(237,227,200,0.5);margin-top:2px;font-weight:500;white-space:nowrap}
.di-tap{font-size:9.5px;color:rgba(124,79,192,0.9);font-weight:700;flex-shrink:0;letter-spacing:0.3px;margin-left:4px}
@keyframes di-pulse{0%,100%{box-shadow:0 12px 32px rgba(0,0,0,0.55),0 0 0 1px rgba(255,255,255,0.09),inset 0 1px 0 rgba(255,255,255,0.12)}50%{box-shadow:0 12px 32px rgba(0,0,0,0.55),0 0 0 2px rgba(212,168,67,0.3),inset 0 1px 0 rgba(255,255,255,0.12)}}
#dynamic-island.show.di-pulsing{animation:di-pulse 2s ease-in-out infinite}
/* ── SCHEDULE PANE SWITCHER ── */
.sch-tab-bar{display:flex;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.07);border-radius:16px;padding:4px;margin-bottom:13px;gap:2px;position:relative}
.sch-tab{flex:1;padding:9px 6px;border-radius:12px;border:none;background:none;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all 0.25s cubic-bezier(0.34,1.56,0.64,1);color:rgba(237,227,200,0.35);letter-spacing:0.2px}
.sch-tab.on{background:rgba(212,168,67,0.14);color:var(--gold)}
.sch-pane-outer{overflow:hidden;width:100%;position:relative}
.sch-pane-track{display:flex;will-change:transform;transition:transform 0.42s cubic-bezier(0.34,1.56,0.64,1)}
.sch-pane{width:100%;flex-shrink:0;box-sizing:border-box}
.sch-dots{display:flex;align-items:center;justify-content:center;gap:5px;margin:10px 0 4px}
.sch-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.14);transition:all 0.35s cubic-bezier(0.34,1.56,0.64,1)}
.sch-dot.on{background:var(--gold);width:20px;border-radius:4px}
/* ── DUEL CHARTS (B3/B4) ── */
.duel-section{margin-bottom:11px}
.duel-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:11px}
.duel-chart-wrap{overflow-x:auto;transform:translateY(var(--parallax-y,0px));will-change:transform}
.duel-insight{font-size:11.5px;color:var(--cream2);line-height:1.6;padding:9px 12px;background:rgba(124,79,192,0.08);border:1px solid rgba(124,79,192,0.2);border-radius:11px;margin-top:10px;position:relative;z-index:1}
/* ── SPARKLINE CARDS (B6) ── */
.sparkline-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:11px}
.sparkline-card{background:var(--glass);border:1px solid var(--glass-border);border-radius:18px;padding:12px 10px;backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);cursor:pointer;opacity:0;transform:translateY(calc(12px + var(--parallax-y, 0px)));transition:opacity 0.38s var(--ease),transform 0.42s var(--spring);position:relative;overflow:hidden}
.sparkline-card.vis{opacity:1;transform:translateY(var(--parallax-y, 0px))}
.sparkline-card:active{background:rgba(255,255,255,0.08);transform:translateY(var(--parallax-y, 0px)) scale(0.97)}
.sk-title{font-size:8.5px;letter-spacing:0.8px;text-transform:uppercase;color:rgba(212,168,67,0.6);font-weight:700;margin-bottom:7px}
.sk-insight{font-size:9px;color:var(--cream3);margin-top:6px;line-height:1.4;font-weight:500}
/* ── LEADERBOARD CARD (C3/I1) ── */
.rivalry-bar{height:6px;background:rgba(255,255,255,0.07);border-radius:3px;overflow:hidden;margin:8px 0 6px}
.rivalry-badge{display:inline-block;padding:3px 10px;border-radius:10px;font-size:10px;font-weight:700;margin-top:8px}
.rivalry-badge.leading{background:rgba(212,168,67,0.14);color:var(--gold);border:1px solid rgba(212,168,67,0.22)}
.rivalry-badge.trailing{background:rgba(124,79,192,0.14);color:var(--purple-lt);border:1px solid rgba(124,79,192,0.22)}
.rivalry-badge.tied{background:rgba(255,255,255,0.07);color:var(--cream2);border:1px solid var(--glass-border)}
/* ── AVATAR (D) ── */
.avatar-svg{border-radius:50%;overflow:hidden;flex-shrink:0}
.avatar-jump{animation:avatar-jump 0.6s var(--spring)}
@keyframes avatar-jump{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.avatar-nod{animation:avatar-nod 0.5s ease-in-out}
@keyframes avatar-nod{0%,100%{transform:rotate(0)}25%{transform:rotate(-5deg)}75%{transform:rotate(5deg)}}
/* ── STREAK SHIELD / COMEBACK (I3) ── */
.shield-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;background:rgba(56,160,108,0.14);border:1px solid rgba(56,160,108,0.25);border-radius:10px;font-size:10px;font-weight:700;color:#5cce8a;margin-left:8px}
.comeback-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;background:rgba(212,168,67,0.14);border:1px solid rgba(212,168,67,0.25);border-radius:10px;font-size:10px;font-weight:700;color:var(--gold);margin-bottom:8px}
/* ── MISC ── */
.ptog{display:flex;background:var(--glass);border:1px solid var(--glass-border);border-radius:12px;padding:3px;margin-bottom:13px}
.ptb{flex:1;padding:8px;border-radius:9px;border:none;background:none;color:rgba(237,227,200,0.35);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all 0.22s}
.ptb.on{background:rgba(212,168,67,0.14);color:var(--gold)}
.rival-line{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.cmp-bar-bg{flex:1;height:5px;background:rgba(255,255,255,0.07);border-radius:3px;overflow:hidden}
.cmp-bar-f{height:100%;border-radius:3px;transition:width 0.6s var(--spring)}
.rival-insight{font-size:12.5px;color:var(--cream2);line-height:1.6;padding:10px 13px;background:rgba(124,79,192,0.08);border:1px solid rgba(124,79,192,0.18);border-radius:12px;margin-top:10px}
.si{display:flex;align-items:center;padding:11px 0;border-bottom:1px solid rgba(255,255,255,0.055)}
.si:last-child{border-bottom:none}
.si-i{font-size:19px;width:28px;text-align:center;flex-shrink:0}
.si-in{flex:1;min-width:0;margin-left:9px}
.si-n{font-size:13px;color:var(--cream);font-weight:500}
.si-s{font-size:11px;color:var(--cream3);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.si-a{display:flex;gap:6px;flex-shrink:0}
.ib{background:var(--glass);border:1px solid var(--glass-border);border-radius:8px;padding:5px 9px;cursor:pointer;font-size:12px;color:var(--cream2)}
.ib.del{color:rgba(212,64,96,0.75)}
.toggle{display:inline-flex;align-items:center;gap:10px;cursor:pointer}
.tog-t{width:44px;height:26px;border-radius:13px;background:rgba(255,255,255,0.12);border:1px solid var(--glass-border);position:relative;transition:background 0.3s;flex-shrink:0}
.tog-t.on{background:var(--purple)}
.tog-knob{position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,0.4);transition:transform 0.3s var(--spring)}
.tog-t.on .tog-knob{transform:translateX(18px)}
.mo{position:fixed;inset:0;background:rgba(0,0,0,0.72);z-index:200;display:flex;align-items:flex-end;animation:fadeI 0.2s ease both}
.ms{background:rgba(12,9,22,0.97);backdrop-filter:blur(44px);-webkit-backdrop-filter:blur(44px);border-radius:28px 28px 0 0;padding:20px 20px calc(env(safe-area-inset-bottom,0px)+24px);width:100%;max-height:92vh;overflow-y:auto;border-top:1px solid rgba(255,255,255,0.12);animation:sheetUp 0.38s var(--spring) both}
@keyframes fadeI{from{opacity:0}to{opacity:1}}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
/* J5: touch-action:none on drag handle only — prevents scroll-behind-modal conflict */
.dh{width:38px;height:4px;border-radius:2px;background:rgba(255,255,255,0.15);margin:0 auto 18px;touch-action:none;cursor:grab;padding:10px 0;box-sizing:content-box;margin-top:-10px}
.mt{font-size:17px;font-weight:800;color:var(--cream);margin-bottom:18px;text-align:center}
.mt-s{font-size:12px;color:var(--cream3);font-weight:400;display:block;margin-top:2px;letter-spacing:0}
.dc-w{display:flex;gap:5px;flex-wrap:wrap}
.dc{padding:5px 9px;border-radius:8px;background:rgba(255,255,255,0.06);border:1px solid var(--glass-border);color:rgba(237,227,200,0.38);cursor:pointer;font-size:11px;font-weight:700;transition:all 0.2s;user-select:none}
.dc.on{background:rgba(124,79,192,0.28);border-color:rgba(168,120,232,0.5);color:var(--gold)}
#toast{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + var(--tab-h) + 10px);left:50%;transform:translateX(-50%) translateY(8px);background:rgba(14,10,26,0.94);border:1px solid rgba(255,255,255,0.1);backdrop-filter:blur(20px);border-radius:20px;padding:9px 18px;font-size:13px;font-weight:600;color:var(--cream);z-index:300;opacity:0;pointer-events:none;white-space:nowrap;transition:opacity 0.25s,transform 0.25s var(--spring)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.htrow{display:flex;gap:8px;margin-bottom:13px}
.ht{flex:1;padding:9px;border-radius:12px;border:1px solid var(--glass-border);background:var(--glass);color:var(--cream3);cursor:pointer;font-size:12px;font-weight:700;text-align:center;font-family:inherit;transition:all 0.2s}
.ht.on{background:rgba(212,168,67,0.12);border-color:rgba(212,168,67,0.28);color:var(--gold)}
.empty{text-align:center;padding:30px 20px;color:var(--cream3)}
.empty .ei{font-size:34px;margin-bottom:10px}
.empty p{font-size:13px;line-height:1.7}
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.4px}
.bg{background:rgba(212,168,67,0.14);color:var(--gold);border:1px solid rgba(212,168,67,0.2)}
.bp{background:rgba(124,79,192,0.14);color:var(--purple-lt);border:1px solid rgba(124,79,192,0.2)}
.bgr{background:rgba(56,160,108,0.14);color:#5cce8a;border:1px solid rgba(56,160,108,0.2)}
.br{background:rgba(212,64,96,0.14);color:#e06080;border:1px solid rgba(212,64,96,0.2)}
.srow{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.055)}
.srow:last-child{border-bottom:none}
.bw{width:100%;height:3px;background:rgba(255,255,255,0.07);border-radius:2px;margin-top:4px}
.bf{height:3px;border-radius:2px;transition:width 0.5s var(--spring)}
.hdr-sub{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;padding:0 2px}
.hdr-sub-t{font-size:10px;letter-spacing:1.3px;text-transform:uppercase;color:rgba(212,168,67,0.62);font-weight:700}
.hdr-sub-a{font-size:11px;color:rgba(168,120,232,0.85);cursor:pointer;font-weight:600}
/* G1: keyboard focus-visible styles for all custom interactive elements */
.sparkline-card:focus-visible,.ring-c:focus-visible,.pp:focus-visible,.tb:focus-visible,.ib:focus-visible,.btn:focus-visible,.btn-g:focus-visible,.btn-m:focus-visible,.btn-p:focus-visible,.tog-t:focus-visible,.dc:focus-visible,[role="switch"]:focus-visible,[role="button"]:focus-visible{outline:2px solid rgba(168,120,232,0.85);outline-offset:2px;border-radius:inherit}
.hdr-sub-a:focus-visible{outline:2px solid rgba(168,120,232,0.8);border-radius:4px;outline-offset:2px}
.chart-w{width:100%;overflow-x:auto}
/* ── LOG LOCKED STATE (F2) ── */
.log-locked{pointer-events:none;opacity:0.5}
.log-lock-banner{background:rgba(212,64,96,0.12);border:1px solid rgba(212,64,96,0.28);border-radius:12px;padding:9px 14px;font-size:12px;color:#e06080;margin-bottom:12px;line-height:1.5}
/* ── Item 9: Unscheduled blocks section ── */
.pw-wrap{position:relative;display:flex;align-items:center;margin-bottom:2px}
.pw-wrap input{flex:1;padding-right:44px}
.pw-wrap .pw-eye{position:absolute;right:8px;background:none;border:none;cursor:pointer;font-size:16px;padding:4px;color:var(--cream2);line-height:1}
/* ── Item 21: Pip speech bubble ── */
#pip-bubble{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + 72px);left:50%;transform:translateX(-50%);background:rgba(18,12,32,0.95);border:1px solid rgba(212,168,67,0.35);border-radius:18px;padding:8px 16px;font-size:12px;font-weight:600;color:var(--cream);z-index:150;display:none;pointer-events:none;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,0.35);max-width:240px;text-align:center;animation:bubbleIn 0.25s var(--spring) both}
/* A4 (v9): Down-arrow on bubble pointing toward avatar */
#pip-bubble::after{content:'';position:absolute;bottom:-7px;left:50%;transform:translateX(-50%);border-left:7px solid transparent;border-right:7px solid transparent;border-top:7px solid rgba(18,12,32,0.95)}
@keyframes bubbleIn{from{opacity:0;transform:translateX(-50%) translateY(8px) scale(0.9)}to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}}
/* ── Item 22: Jiggle animation for accessories ── */
@keyframes jiggle{0%,100%{transform:rotate(0)}25%{transform:rotate(8deg)}50%{transform:rotate(-6deg)}75%{transform:rotate(3deg)}}
.jiggle{animation:jiggle 0.4s ease-out}
/* ── Item 9: Unscheduled blocks section ── */
.unscheduled-block{padding:6px 10px;background:rgba(212,64,96,0.1);border-radius:8px;margin-bottom:4px;font-size:11px;border:1px solid rgba(212,64,96,0.2)}
/* ── Item 23: Level badge ── */
.level-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(212,168,67,0.14);border:1px solid rgba(212,168,67,0.3);border-radius:10px;padding:2px 8px;font-size:10px;font-weight:700;color:var(--gold);margin-left:6px}
/* ── v10: Samsung-style Calendar ── */
.sch-cal{background:rgba(0,0,0,0.55);border-radius:18px;padding:16px 10px 10px;margin-bottom:12px;border:1px solid rgba(255,255,255,0.07)}
.sch-cal-hdr{display:flex;align-items:center;justify-content:space-between;padding:0 4px;margin-bottom:14px}
.sch-cal-month{font-size:18px;font-weight:800;color:#fff;letter-spacing:1px;text-transform:uppercase}
.sch-cal-nav{background:none;border:none;color:rgba(255,255,255,0.55);font-size:22px;padding:4px 10px;cursor:pointer;border-radius:8px;transition:background 0.15s}
.sch-cal-nav:active{background:rgba(255,255,255,0.08)}
.sch-cal-grid{display:grid;grid-template-columns:32px repeat(7,1fr);gap:0}@media(max-width:360px){.sch-cal-date{font-size:12px}.sch-cal-grid{grid-template-columns:24px repeat(7,1fr)}}
.sch-cal-wk-hdr{grid-column:1;height:28px}
.sch-cal-day-hdr{height:28px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;letter-spacing:0.3px}
.sch-cal-day-hdr.sat{color:#4dd0e1}
.sch-cal-day-hdr.sun{color:#ef9a9a}
.sch-cal-wk{display:flex;align-items:center;justify-content:flex-end;padding-right:6px;font-size:9px;color:rgba(255,255,255,0.22);font-weight:600;font-variant-numeric:tabular-nums}
.sch-cal-cell{height:44px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;border-radius:10px;position:relative;transition:background 0.15s}
.sch-cal-cell:active{background:rgba(255,255,255,0.08)}
.sch-cal-cell .sch-cal-date{font-size:14px;font-weight:600;color:#fff;line-height:1;transition:color 0.15s}
.sch-cal-cell.other-month .sch-cal-date{color:rgba(255,255,255,0.22)}
.sch-cal-cell.sat .sch-cal-date{color:#4dd0e1}
.sch-cal-cell.sun .sch-cal-date{color:#ef9a9a}
.sch-cal-cell.today:not(.selected) .sch-cal-date{border:1.5px solid rgba(255,255,255,0.7);border-radius:6px;padding:2px 5px}
.sch-cal-cell.selected{background:rgba(255,255,255,0.12)}
.sch-cal-cell.selected .sch-cal-date{border:1.5px solid #fff;border-radius:6px;padding:2px 5px;color:#fff!important}

<script>
'use strict';
/* ── INDEXEDDB ── */
let _idbAvailable=true; /* Set false if IDB is unavailable (Safari private mode) */
const IDB=(()=>{
  let _db=null;
  async function open(){
    if(_db)return _db;
    return new Promise((res,rej)=>{
      let r;
      try{r=indexedDB.open('GrowthCodex',1);}catch(e){_idbAvailable=false;rej(e);return}
      r.onupgradeneeded=e=>{if(!e.target.result.objectStoreNames.contains('kv'))e.target.result.createObjectStore('kv')};
      r.onsuccess=e=>{_db=e.target.result;res(_db)};
      r.onerror=e=>{_idbAvailable=false;rej(e.target.error)};
    });
  }
  return{
    async get(k){const db=await open();return new Promise((res,rej)=>{const r=db.transaction('kv','readonly').objectStore('kv').get(k);r.onsuccess=()=>res(r.result??null);r.onerror=e=>rej(e)})},
    async set(k,v){const db=await open();return new Promise((res,rej)=>{const r=db.transaction('kv','readwrite').objectStore('kv').put(v,k);r.onsuccess=()=>res();r.onerror=e=>rej(e)})},
    /* FIX Issue 7: atomic multi-key write in a single transaction */
    async setMultiple(entries){
      const db=await open();
      return new Promise((res,rej)=>{
        const tx=db.transaction('kv','readwrite');
        const store=tx.objectStore('kv');
        entries.forEach(([k,v])=>store.put(v,k));
        tx.oncomplete=()=>res();
        tx.onerror=e=>rej(e.target.error);
        tx.onabort=e=>rej(e.target.error);
      });
    }
  };
})();
const CACHE={};
const DB={
  get(k){return k in CACHE?CACHE[k]:null},
  /* FIX Issue 6: propagate IDB errors instead of silently swallowing them.
     Returns a promise so callers can handle failures on critical paths. */
  set(k,v){
    CACHE[k]=v;
    return IDB.set(k,v).catch(err=>{
      console.error('[GrowthCodex] Persistence error for key',k,err);
      /* Only show a toast for writes that aren't background metadata */
      if(k!=='pgc_prevLead'&&k!=='__bk_ts__'){
        const el=document.getElementById('toast');
        if(el&&!el.classList.contains('show')){
          el.textContent='⚠️ Save error — data may not persist';
          el.classList.add('show');
          setTimeout(()=>el.classList.remove('show'),3200);
        }
      }
    });
  }
};
const K={PRF:'pgc_profiles',ACT:'pgc_active',FIX:'pgc_fixed',SES:'pgc_sessions',THM:'pgc_theme',SOUND:'pgc_sound',lg:id=>`pgc_${id}_logs`,sp:id=>`pgc_${id}_spheres`,fix:id=>`pgc_${id}_fixed`,ses:id=>`pgc_${id}_sessions`};
const DS=[
  {id:'discipline',name:'Discipline',icon:'⚔️',color:'#c9a84c'},
  {id:'prayer',name:'Prayer Life',icon:'🙏',color:'#e8cb78'},
  {id:'punctual',name:'Punctuality',icon:'⏰',color:'#9a72e0'},
  {id:'classes',name:'Classes',icon:'📚',color:'#5588dd'},
  {id:'timemgmt',name:'Time Mgmt',icon:'🎯',color:'#42aa78'},
  {id:'sleep',name:'Sleep',icon:'🌙',color:'#6688aa'},
];
const DF=[
  {id:'f1',name:'Wake Up',start:'05:00',end:'05:30',days:[0,1,2,3,4,5,6],category:'routine'},
  {id:'f2',name:'Morning Prayer',start:'05:30',end:'06:30',days:[0,1,2,3,4,5,6],category:'prayer'},
  {id:'f3',name:'Breakfast',start:'07:00',end:'07:30',days:[0,1,2,3,4,5,6],category:'meal'},
  {id:'f4',name:'Lunch',start:'12:00',end:'13:00',days:[0,1,2,3,4,5,6],category:'meal'},
  {id:'f5',name:'Evening Prayer',start:'19:00',end:'20:00',days:[0,1,2,3,4,5,6],category:'prayer'},
  {id:'f6',name:'Dinner',start:'20:00',end:'20:30',days:[0,1,2,3,4,5,6],category:'meal'},
  {id:'f7',name:'Sleep',start:'22:00',end:'05:00',days:[0,1,2,3,4,5,6],category:'sleep'},
];

/* ── BOOT ── */
async function bootDB(){
  const keys=[K.PRF,K.ACT,K.FIX,K.SES,K.THM];
  let hasData=false;
  for(const k of keys){
    try{const v=await IDB.get(k);if(v!==null&&v!==undefined){CACHE[k]=v;hasData=true}}catch(e){}
  }
  if(!hasData){
    Object.keys(localStorage).filter(k=>k.startsWith('pgc_')).forEach(k=>{
      try{
        const v=JSON.parse(localStorage.getItem(k));
        if(v!=null){
          CACHE[k]=v;
          /* I3: remove localStorage key only after confirmed IDB write */
          IDB.set(k,v).then(()=>{try{localStorage.removeItem(k);}catch(e){}}).catch(()=>{});
        }
      }catch(e){}
    });
  }
  const profs=CACHE[K.PRF]||[];
  for(const p of profs){
    for(const k of[K.sp(p.id),K.lg(p.id),K.fix(p.id),K.ses(p.id)]){
      if(k in CACHE)continue;
      try{const v=await IDB.get(k);if(v!==null&&v!==undefined)CACHE[k]=v;}catch(e){}
    }
  }
  if(!CACHE[K.PRF]||!CACHE[K.PRF].length){
    const restored=await autoRestore();
    if(!restored)initDefaults();
  }
  /* Item 1: One-time migration of legacy global fixed blocks to active profile */
  const legacyFixed=DB.get(K.FIX);
  if(Array.isArray(legacyFixed)&&legacyFixed.length>0){
    const profiles=gProfs();
    const targetPid=profiles[0]?.id||'eleven';
    const existing=DB.get(K.fix(targetPid))||[];
    DB.set(K.fix(targetPid),[...existing,...legacyFixed]);
    IDB.set(K.FIX,null).catch(()=>{});
    delete CACHE[K.FIX];
  }
  /* Item 18: Migrate avatar configs from string to object format */
  const _defAvatarCfg={body:'round',skin:'#f5c8a0',eyes:'round',mouth:'smile',outfit:'hoodie',outfitColor1:'#4a4a6a',outfitColor2:'#2a2a4a',accessory:'none',accessoryColor:'#d4a843',hairColor:'#3a1a04'};
  const profs18=gProfs();
  let needsAvatarMigration=false;
  const migratedProfs=profs18.map(p=>{
    if(!p.avatarConfig||typeof p.avatarConfig==='string'){
      needsAvatarMigration=true;
      const parts=(p.avatarConfig||'circle,short,plain,default,smile').split(',');
      return{...p,avatarConfig:{..._defAvatarCfg,body:parts[0]||'round',outfit:parts[2]||'hoodie',eyes:parts[3]||'round',mouth:parts[4]||'smile'},companionXP:p.companionXP||0};
    }
    if(!p.companionXP)return{...p,companionXP:0};
    return p;
  });
  if(needsAvatarMigration)DB.set(K.PRF,migratedProfs);
  /* W4 FIX: Request persistent storage to protect IndexedDB data from Safari's 7-day eviction
     policy. This must be called in a browsing context — no user gesture required for
     navigator.storage.persist() itself, though Safari may grant it automatically when the app
     is used as an installed Home Screen PWA. On non-iOS browsers this further reduces
     the risk of browser-initiated storage eviction under disk pressure. */
  try{
    if(navigator.storage&&navigator.storage.persist){
      navigator.storage.persist().then(granted=>{
        if(!granted&&!sessionStorage.getItem('pgc_persist_warned')){
          sessionStorage.setItem('pgc_persist_warned','1');
          /* Only warn once; not blocking — data is still stored, just not guaranteed persistent */
          setTimeout(()=>showToast('💾 Tip: Add to Home Screen for protected storage',4000),3500);
        }
      }).catch(()=>{});
    }
  }catch(e){}
}
function initDefaults(){
  DB.set(K.PRF,[{id:'eleven',name:'Eleven',avatar:'E',color:'#7c4fc0',companionXP:0},{id:'friend',name:'Friend',avatar:'F',color:'#d4a843',companionXP:0}]);
  DB.set(K.ACT,'eleven');DB.set(K.SES,[]);
  /* Item 1: Per-profile fixed blocks */
  DB.set(K.fix('eleven'),DF);DB.set(K.fix('friend'),[]);
  ['eleven','friend'].forEach(id=>{DB.set(K.sp(id),DS.map(s=>({...s})));DB.set(K.lg(id),[])});
}

/* ── AUTO BACKUP (F5) ── */
let _opfsFailed=false;
async function autoBackup(){
  try{
    const snap={};Object.keys(CACHE).forEach(k=>{snap[k]=CACHE[k]});
    const json=JSON.stringify(snap);
    await IDB.set('__bk__',snap);await IDB.set('__bk_ts__',Date.now());
    try{
      if(navigator.storage?.getDirectory){
        const root=await navigator.storage.getDirectory();
        const fh=await root.getFileHandle('codex_backup.json',{create:true});
        const writable=await fh.createWritable();
        await writable.write(json);await writable.close();
      }
    }catch(e){
      if(!_opfsFailed){_opfsFailed=true;setTimeout(()=>showToast('⚠️ Phone backup unavailable — data saved to browser only',3500),1200)}
    }
  }catch(e){}
}
async function autoRestore(){
  try{const d=await IDB.get('__bk__');if(d&&d[K.PRF]){Object.assign(CACHE,d);return true}}catch(e){}
  try{
    if(navigator.storage?.getDirectory){
      const root=await navigator.storage.getDirectory();
      const fh=await root.getFileHandle('codex_backup.json');
      const file=await fh.getFile();
      const d=JSON.parse(await file.text());
      if(d&&d[K.PRF]){Object.assign(CACHE,d);IDB.set('__bk__',d).catch(()=>{});return true}
    }
  }catch(e){}
  return false;
}

/* ── HELPERS ── */
const gProfs=()=>DB.get(K.PRF)||[];
const gActive=()=>DB.get(K.ACT)||'eleven';
/* Item 1: Strict per-profile fixed blocks — no global fallback */
const gFixed=()=>{const pid=gActive();return DB.get(K.fix(pid))||[];};
/* Returns the user's configured sleep window from their fixed blocks.
 * Falls back to the default 22:00-05:00 if no sleep block is defined.
 * Usage: const {start,end} = getUserSleepWindow(); */
function getUserSleepWindow(){
  const pid=gActive();
  const blocks=DB.get(K.fix(pid))||[];
  const sleepBlock=blocks.find(b=>(b.category==='sleep'||/sleep/i.test(b.name))&&b.mode!=='duration'&&b.start&&b.end);
  if(sleepBlock)return{start:sleepBlock.start,end:sleepBlock.end,name:sleepBlock.name,source:'user'};
  /* Fallback: default sleep window */
  return{start:'22:00',end:'05:00',name:'Sleep',source:'default'};
}
/* Returns true if the given HH:MM time falls within the user's sleep window */
function isDuringSleep(timeStr){
  const {start,end}=getUserSleepWindow();
  const [sh,sm]=start.split(':').map(Number);
  const [eh,em]=end.split(':').map(Number);
  const [th,tm]=timeStr.split(':').map(Number);
  const t=th*60+tm,s=sh*60+sm,e=eh*60+em;
  /* Overnight window (e.g. 22:00-05:00): wraps past midnight */
  return s>e?(t>=s||t<=e):(t>=s&&t<=e);
}
const gSess=()=>DB.get(K.ses(gActive()))||DB.get(K.SES)||[];
const gSph=id=>DB.get(K.sp(id))||DS.map(s=>({...s}));
/* Item 2: Explicit pid in gLogs — no implicit state */
const gLogs=id=>DB.get(K.lg(id))||[];
const aProf=()=>gProfs().find(p=>p.id===gActive())||{id:'eleven',name:'Eleven',color:'#7c4fc0',avatar:'E'};
/* FIX Issue 4: Use local date instead of UTC to prevent off-by-one errors in negative timezones */
const today=()=>{const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`};
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,5);
const fFull=iso=>{const d=parseDate(iso);return d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})};
const fShort=iso=>{const d=parseDate(iso);return d.toLocaleDateString('en-US',{month:'short',day:'numeric'})};
const fMicro=iso=>{const d=parseDate(iso);return d.toLocaleDateString('en-US',{month:'short',day:'numeric'}).replace(' ','')};
const dow=iso=>parseDate(iso).getDay();
const scCol=v=>v>=8?'#42cc88':v>=6?'#c9a84c':v>=4?'#d08038':'#d44060';
/* J6: single timeout prevents overlapping toasts */
let _toastTO=null;
function showToast(msg,ms=2400){const el=document.getElementById('toast');clearTimeout(_toastTO);el.textContent=msg;el.classList.add('show');_toastTO=setTimeout(()=>el.classList.remove('show'),ms)}
function escapeHTML(str){if(str==null)return'';return String(str).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
/* H1: parseDate uses explicit local-time construction to prevent Safari UTC-shift bug.
   new Date('2024-01-15') is parsed as UTC midnight in Safari, shifting the date in
   negative-offset timezones. Splitting and using Date constructor avoids this. */
const parseDate=iso=>{const[y,m,d]=(iso||'').split('-').map(Number);return isNaN(y)?new Date(NaN):new Date(y,m-1,d);};

/* ── HAPTICS (A8) ── */
const Haptics={
  light:()=>navigator.vibrate?.(10),
  success:()=>navigator.vibrate?.(15),
  streak:()=>navigator.vibrate?.([20,30,20]),
  leaderboard:()=>navigator.vibrate?.([15,20,15])
};

/* ── DYNAMIC ISLAND (A7) — Rich structured pill ── */
let _diQueue=[],_diShowing=false,_diActionFn=null;

// showDI: accepts either a plain string or a config object
// Config: {icon, iconType, title, sub, actionFn, ms, tapLabel, pulse}
// iconType: 'success'|'warning'|'info'|'trophy'|'streak'|'rival'
function showDI(msgOrCfg,actionFn,ms=4000){
  if(typeof msgOrCfg==='string'){
    // Legacy string call — auto-parse icon from message
    const str=msgOrCfg;
    let icon='🔔',iconType='info',title=str,sub='';
    // Auto-detect type from common emoji prefixes
    if(/^✓|^✅/.test(str)){icon='✓';iconType='success';title=str.replace(/^✓\s*/,'');}
    else if(/^🔥/.test(str)){icon='🔥';iconType='streak';title=str.replace(/^🔥\s*/,'');}
    else if(/^🏆|^🥇|^⭐/.test(str)){icon=str[0];iconType='trophy';title=str.replace(/^[\u{1F3C6}\u{1F947}\u2B50]\s*/u,'');}
    else if(/^⚡|^😬|^❌/.test(str)){icon=str[0];iconType='rival';title=str.replace(/^.\s*/,'');}
    else if(/^📅|^📋/.test(str)){icon=str[0];iconType='info';title=str.replace(/^.\s*/,'');}
    else if(/^⚠️/.test(str)){icon='⚠️';iconType='warning';title=str.replace(/^⚠️\s*/,'');}
    // Split "—" into title + subtitle
    if(title.includes(' — ')){const p=title.split(' — ');title=p[0];sub=p.slice(1).join(' — ');}
    _diQueue.push({icon,iconType,title,sub,actionFn,ms,tapLabel:actionFn?'Tap to view':'',pulse:false});
  } else {
    _diQueue.push({...msgOrCfg,actionFn:msgOrCfg.actionFn||actionFn,ms:msgOrCfg.ms||ms});
  }
  if(!_diShowing)_processDI();
}

function _processDI(){
  if(!_diQueue.length){_diShowing=false;return}
  _diShowing=true;
  const cfg=_diQueue.shift();
  const el=document.getElementById('dynamic-island');
  _diActionFn=cfg.actionFn||null;
  el.classList.remove('show','hiding','di-pulsing');

    ${cfg.tapLabel||cfg.actionFn?`<div class="di-tap">${escapeHTML(cfg.tapLabel||'Open →')}</div>`:''}

/* ── ANALYTICS ── */
/* FIX Issue 5: Normalize cutoff to midnight so analytics are time-of-day independent */
function logsIn(pid,days){const cut=new Date();cut.setHours(0,0,0,0);cut.setDate(cut.getDate()-days);return gLogs(pid).filter(l=>parseDate(l.date)>=cut)}
function logOn(pid,date){return gLogs(pid).find(l=>l.date===date)||null}
/* Item 16: sAvg/oAvg explicitly skip null (N/A) scores */
function sAvg(logs,sid){const v=logs.filter(l=>l.scores?.[sid]?.value!=null&&l.scores[sid].value!==null).map(l=>l.scores[sid].value);return v.length?v.reduce((a,b)=>a+b,0)/v.length:null}
function oAvg(logs,sph){const a=sph.map(s=>sAvg(logs,s.id)).filter(v=>v!==null);return a.length?a.reduce((a,b)=>a+b,0)/a.length:null}
function trendV(logs,sid){
  const s=[...logs].sort((a,b)=>a.date.localeCompare(b.date)).filter(l=>l.scores?.[sid]?.value!=null);
  if(s.length<2)return 0;
  const m=Math.floor(s.length/2);
  const A=s.slice(0,m).reduce((x,l)=>x+l.scores[sid].value,0)/m;
  const B=s.slice(m).reduce((x,l)=>x+l.scores[sid].value,0)/(s.length-m);
  return B-A;
}
function streak(pid){
  const dateSet=new Set(gLogs(pid).map(l=>l.date));
  if(!dateSet.size)return 0;
  let c=0;const d=new Date();d.setHours(0,0,0,0);
  /* FIX Issue 4: use local date string to avoid UTC off-by-one in negative timezones */
  for(let i=0;i<400;i++){const iso=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;if(dateSet.has(iso))c++;else if(i>0)break;d.setDate(d.getDate()-1)}
  return c;
}
function consist(pid,days=30){return Math.round((logsIn(pid,days).length/days)*100)}
function streakStatus(pid){
  const sk=streak(pid);const logs=gLogs(pid);const td=today();
  if(!sk)return'safe';
  /* FIX Issue 4: use local date for yesterday to avoid UTC off-by-one */
  const yesterday=new Date();yesterday.setDate(yesterday.getDate()-1);
  const yiso=`${yesterday.getFullYear()}-${String(yesterday.getMonth()+1).padStart(2,'0')}-${String(yesterday.getDate()).padStart(2,'0')}`;
  const loggedToday=logs.some(l=>l.date===td);
  const hadYesterday=logs.some(l=>l.date===yiso);
  if(loggedToday){
    /* K2: shield badge only when: logged today AND yesterday (streak is real),
       streak >= 3 days (meaningful), and it's late enough to be "near-midnight relief" */
    const hour=new Date().getHours();
    if(loggedToday&&hadYesterday&&sk>=3&&hour>=20)return'streak-saved';
    return'safe';
  }
  /* at-risk only when not logged today but had a streak going (yesterday was logged) */
  return hadYesterday?'at-risk':'safe';
}
/* I2: returns null (not 0) when no valid scores exist — prevents first-entry false PB celebration */
function personalBest(pid,sid){const v=gLogs(pid).map(l=>l.scores?.[sid]?.value).filter(v=>v!=null&&typeof v==='number');return v.length?Math.max(...v):null}
function moodGreeting(pid){
  const avg=oAvg(logsIn(pid,3),gSph(pid));
  const h=new Date().getHours();
  const t=h<12?'Morning':h<17?'Afternoon':'Evening';
  if(avg===null)return`Good ${t}`;
  if(avg>=8.5)return`Thriving ${t} 🔥`;
  if(avg>=7)return`Strong ${t} ✨`;
  if(avg>=5.5)return`Building, ${t} 💪`;
  return`Reset mode, ${t} 🌙`;
}
function detectTrends(pid){
  const out=[];
  gSph(pid).forEach(s=>{
    const recent=[...gLogs(pid)].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,5).filter(l=>l.scores?.[s.id]?.value!=null);
    if(recent.length<3)return;
    let drops=0,rises=0;
    for(let i=0;i<recent.length-1;i++){if(recent[i].scores[s.id].value<recent[i+1].scores[s.id].value)drops++;else break}
    for(let i=0;i<recent.length-1;i++){if(recent[i].scores[s.id].value>recent[i+1].scores[s.id].value)rises++;else break}
    if(drops>=2)out.push({type:'warning',title:`📉 ${escapeHTML(s.name)} Falling`,body:`Dropped ${drops+1} entries in a row — attention needed.`});
    else if(rises>=2)out.push({type:'momentum',title:`📈 ${escapeHTML(s.name)} Rising`,body:`Improved ${rises+1} entries in a row — keep it up.`});
  });
  return out;
}
function weeklyDebrief(pid){
  const sph=gSph(pid);
  /* I4: use precise exclusive date boundaries to avoid off-by-one.
     This week  = logs from 7 days ago (inclusive) through today.
     Last week  = logs from 14 days ago (inclusive) through 7 days ago (exclusive). */
  const now=new Date();now.setHours(0,0,0,0);
  const cut7=new Date(now);cut7.setDate(cut7.getDate()-7);
  const cut14=new Date(now);cut14.setDate(cut14.getDate()-14);
  const allRecent=gLogs(pid).filter(l=>{const d=parseDate(l.date);return d>=cut14;});
  const tw=allRecent.filter(l=>parseDate(l.date)>=cut7);
  const lw=allRecent.filter(l=>{const d=parseDate(l.date);return d>=cut14&&d<cut7;});
  if(!tw.length)return null;
  const ta=oAvg(tw,sph);const la=oAvg(lw,sph);
  const srt=[...sph].map(s=>({...s,avg:sAvg(tw,s.id)??0})).sort((a,b)=>b.avg-a.avg||(a.id<b.id?-1:1));
  const delta=ta!==null&&la!==null?ta-la:null;
  let tip='';
  const worst=srt[srt.length-1];const best=srt[0];
  if(worst&&worst.avg<6)tip=`Focus on ${worst.name} — even +1 pt daily compounds fast.`;
  else if(best&&best.avg>=8)tip=`${best.name} is your anchor. Protect the habits driving it.`;
  else tip='Log daily — consistency unlocks sharper intelligence.';
  return{ta,la,delta,best,worst,days:tw.length,tip};
}
function insights(pid,days=7){
  const sph=gSph(pid);const logs=logsIn(pid,days);const all=gLogs(pid);const out=[];
  if(all.length<2)return[{type:'info',title:'🌱 Getting Started',body:'Log your first entries to unlock your personal intelligence report.'}];
  const avgs={};sph.forEach(s=>{avgs[s.id]=sAvg(logs,s.id)});
  const valid=Object.entries(avgs).filter(([,v])=>v!==null);
  if(valid.length){
    const sorted=[...valid].sort((a,b)=>b[1]-a[1]);
    const[bId,bV]=sorted[0];const[wId,wV]=sorted[sorted.length-1];
    const bs=sph.find(s=>s.id===bId);const ws=sph.find(s=>s.id===wId);
    if(bs&&bV>=6)out.push({type:'strength',title:`${bs.icon} Anchor: ${escapeHTML(bs.name)}`,body:`Leading at ${bV.toFixed(1)}/10 — your strongest asset this period.`});
    if(ws&&wV<6)out.push({type:'weakness',title:`${ws.icon} Priority: ${escapeHTML(ws.name)}`,body:`At ${wV.toFixed(1)}/10 — this sphere needs deliberate attention.`});
    if(ws&&wV>=7&&valid.length>2)out.push({type:'achievement',title:'🌟 Balanced Performance',body:'All spheres above 7 — exceptional multi-dimensional consistency.'});
  }
  sph.forEach(s=>{
    const t=trendV(logs,s.id);
    if(t>=1.2)out.push({type:'momentum',title:`📈 ${escapeHTML(s.name)} Rising`,body:`Up ${t.toFixed(1)} pts — strong positive trajectory.`});
    else if(t<=-1.2)out.push({type:'warning',title:`📉 ${escapeHTML(s.name)} Declining`,body:`Down ${Math.abs(t).toFixed(1)} pts — identify root cause.`});
  });
  detectTrends(pid).forEach(a=>{if(!out.find(o=>o.title===a.title))out.push(a)});
  const sk=streak(pid);
  if(sk>=5)out.push({type:'achievement',title:`🔥 ${sk}-Day Streak`,body:'Consistent logging builds real growth intelligence.'});
  const cs=consist(pid);
  if(cs<40&&all.length>5)out.push({type:'warning',title:'⚠️ Low Logging Rate',body:`${cs}% in 30 days. More entries = sharper intelligence.`});
  return out.slice(0,6);
}

/* ── DUEL INSIGHT (B5) — UX-1: Weakness first, specific sphere always named ── */
function generateDuelInsight(todayData,yesterdayData,sph){
  if(!todayData||!sph.length)return'Log today\'s entry to see your head-to-head analysis.';
  const profs=gProfs();if(profs.length<2)return'Add a second profile to unlock rivalry insights.';
  const pid=gActive();const fid=profs.find(p=>p.id!==pid)?.id;if(!fid)return'';
  const friendName=profs.find(p=>p.id===fid)?.name||'Friend';
  const sharedIds=gSph(pid).map(s=>s.id).filter(id=>gSph(fid).some(s=>s.id===id));
  const friendEntry=logOn(fid,today());
  const todayLeads=sharedIds.filter(id=>{
    const myScore=todayData?.scores?.[id]?.value??0;
    const fScore=friendEntry?.scores?.[id]?.value??0;
    return myScore>fScore;
  }).length;
  const yesterdayLeads=sharedIds.filter(id=>{
    /* K1: use the passed yesterdayData parameter instead of redundant logOn call */
    const yDate=new Date();yDate.setDate(yDate.getDate()-1);
    const yiso=`${yDate.getFullYear()}-${String(yDate.getMonth()+1).padStart(2,'0')}-${String(yDate.getDate()).padStart(2,'0')}`;
    const fYEntry=logOn(fid,yiso);
    return(yesterdayData?.scores?.[id]?.value??0)>(fYEntry?.scores?.[id]?.value??0);
  }).length;
  // UX-1: Priority 1 — find the sphere where the user is MOST behind friend
  const deficits=sharedIds.map(id=>{
    const myScore=todayData?.scores?.[id]?.value??0;
    const fScore=friendEntry?.scores?.[id]?.value??0;
    return{id,myScore,fScore,gap:fScore-myScore,sphere:sph.find(s=>s.id===id)};
  }).filter(d=>d.gap>0&&d.sphere).sort((a,b)=>b.gap-a.gap);
  // UX-1: Priority 2 — spheres both users scored poorly on
  const weakSpheres=sharedIds.map(id=>{
    const myScore=todayData?.scores?.[id]?.value??0;
    const fScore=friendEntry?.scores?.[id]?.value??0;
    return{id,myScore,fScore,sphere:sph.find(s=>s.id===id)};
  }).filter(d=>d.myScore<5&&d.fScore<5&&d.sphere).sort((a,b)=>(a.myScore+a.fScore)-(b.myScore+b.fScore));
  const strongSpheres=sharedIds.filter(id=>{
    const myScore=todayData?.scores?.[id]?.value??0;
    const fScore=friendEntry?.scores?.[id]?.value??0;
    return myScore>8&&fScore>8;
  }).map(id=>sph.find(s=>s.id===id)).filter(Boolean);
  const leadChange=todayLeads-yesterdayLeads;
  // UX-1: Weakness messages come FIRST for maximum psychological impact
  if(weakSpheres.length>0){
    const w=weakSpheres[0].sphere;
    return`${w.icon} You both struggled with ${w.name} today. Even +1 point there tomorrow compounds fast.`;
  }
  if(deficits.length>0){
    const d=deficits[0];
    const s=d.sphere;
    return`${s.icon} ${friendName} leads in ${escapeHTML(s.name)} by ${d.gap.toFixed(0)} pt${d.gap!==1?'s':''}. A focused effort there could swing it back.`;
  }
  if(leadChange<0){
    const lostSphere=sharedIds.find(id=>{
      const myScore=todayData?.scores?.[id]?.value??0;
      const fScore=friendEntry?.scores?.[id]?.value??0;
      return fScore>myScore;
    });
    const ls=lostSphere?sph.find(s=>s.id===lostSphere):null;
    return ls?`${ls.icon} ${friendName} took the lead in ${escapeHTML(ls.name)}. Focus there tomorrow.`:`${friendName} closed the gap — ${sharedIds.length-todayLeads} spheres behind. Tomorrow you reclaim it.`;
  }
  if(leadChange>0)return`You're pulling ahead! Now leading in ${todayLeads} spheres. Keep the momentum.`;
  if(todayLeads>3)return`Holding strong — you lead in ${todayLeads} of ${sharedIds.length} spheres.`;
  if(strongSpheres.length>0)return`${strongSpheres[0].icon} Great teamwork in ${strongSpheres[0].name}. That's a shared strength — build on it.`;
  return`📊 Closely matched — ${todayLeads} vs ${sharedIds.length-todayLeads} spheres. Today's log could shift the balance.`;
}

function normalizeAvatarConfig(cfg){
  if(!cfg)return{face:'circle',hair:'short',outfit:'plain',eyes:'default',mouth:'smile'};
  if(typeof cfg==='string'){
    const p=cfg.split(',');
    return{face:p[0]||'circle',hair:p[1]||'short',outfit:p[2]||'plain',eyes:p[3]||'default',mouth:p[4]||'smile'};
  }
  // Object format — map object keys to rendering keys
  const outfitMap={hoodie:'hood',plain:'plain',collar:'collar'};
  return{
    face:cfg.body||'circle',
    hair:'short',
    outfit:outfitMap[cfg.outfit]||cfg.outfit||'plain',
    eyes:cfg.eyes||'default',
    mouth:cfg.mouth||'smile'
  };
}
function renderAvatar(config,size,emotion){
  const c=normalizeAvatarConfig(config);
  const faceKey=`face_${c.face}`;
  const hairKey=`hair_${c.hair}`;
  const outfitKey=`outfit_${c.outfit}`;
  const eyesKey=emotion&&AVATAR_SVG[`eyes_${emotion}_emotion`]?`eyes_${emotion}_emotion`:`eyes_${c.eyes}`;
  const mouthKey=emotion&&AVATAR_SVG[`mouth_${emotion}_emotion`]?`mouth_${emotion}_emotion`:`mouth_${c.mouth}`;
  const s=size||48;
  const avId=Math.random().toString(36).slice(2,7);
  const defs=`<defs>

      <stop offset="0%" stop-color="#6b3a12"/><stop offset="100%" stop-color="#3a1a04"/>
    </linearGradient>
    <filter id="av-sh-${avId}" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.22"/>
    </filter>
  </defs>`;
  const remap=svg=>svg.replace(/url\(#skin-g\)/g,`url(#skin-g-${avId})`).replace(/url\(#hair-g\)/g,`url(#hair-g-${avId})`);
  return`<svg width="${s}" height="${s}" viewBox="0 0 100 100" class="avatar-svg">
    ${defs}
    <circle cx="50" cy="50" r="50" fill="rgba(255,255,255,0.05)"/>
    <g filter="url(#av-sh-${avId})">
      ${remap(AVATAR_SVG[outfitKey]||'')}
      ${remap(AVATAR_SVG[faceKey]||'')}
      ${remap(AVATAR_SVG[hairKey]||'')}

}
function determineAvatarEmotion(context){
  const map={personal_best:'excited',streak_milestone:'happy',score_drop:'determined',low_score:'encouraging',leaderboard_trail:'determined',leaderboard_lead:'happy'};

}

/* ── Item 23: Level System ── */
function computeLevel(xp){return Math.floor(Math.sqrt(xp/10))}
function addXP(pid,amount){
  const profs=gProfs();
  const prof=profs.find(p=>p.id===pid);if(!prof)return;
  const prevXP=prof.companionXP||0;const newXP=prevXP+amount;
  const prevLevel=computeLevel(prevXP);const newLevel=computeLevel(newXP);
  DB.set(K.PRF,profs.map(p=>p.id===pid?{...p,companionXP:newXP}:p));
  if(newLevel>prevLevel){
    const unlocksMsg=newLevel===5?' 🎩 Hat unlocked!':newLevel===10?' 🦸 Cape unlocked!':'';
    setTimeout(()=>{
      showToast(`⭐ Level ${newLevel} reached!${unlocksMsg}`,3200);
      showDI({icon:'⭐',iconType:'trophy',title:`Level ${newLevel} reached!`,sub:unlocksMsg||'Your companion grows stronger',ms:3800,pulse:true});
      pipSay(`Level ${newLevel}! ${unlocksMsg||'Keep going!'}`);
      // UX-7: auto-apply unlocked accessories to the avatar config so hero updates immediately
      if(pid===gActive()&&(newLevel===5||newLevel===10)){
        const latestProfs=gProfs();
        const latestProf=latestProfs.find(p=>p.id===pid);
        if(latestProf?.avatarConfig&&typeof latestProf.avatarConfig==='object'){
          const mergedCfg=applyLevelAccessories(pid,latestProf.avatarConfig);
          DB.set(K.PRF,latestProfs.map(p=>p.id===pid?{...p,avatarConfig:mergedCfg}:p));
          // Refresh sprite colors so hat/accessory appears in hero
          requestAnimationFrame(()=>applySpriteColors(mergedCfg));
        }
      }
      /* A5 (v9): Refresh avatar-preview to show newly unlocked accessory */
      const prevEl=document.getElementById('avatar-preview');
      if(prevEl&&newLevel===5){
        const pid2=gActive();
        const latestCfg=gProfs().find(p=>p.id===pid2)?.avatarConfig;
        const mergedCfg=applyLevelAccessories(pid2,latestCfg||'circle,short,plain,default,smile');
        prevEl.innerHTML=renderAvatar(mergedCfg,64,'happy');
        prevEl.style.animation='none';void prevEl.offsetWidth;prevEl.style.animation='popIn 0.5s var(--spring) both';
      }
    },500);
  }
}
function getUnlockedAccessories(pid){
  const prof=gProfs().find(p=>p.id===pid);
  const xp=prof?.companionXP||0;const lvl=computeLevel(xp);
  const unlocked=['none'];
  if(lvl>=5)unlocked.push('hat');
  if(lvl>=10)unlocked.push('cape');
  return unlocked;
}

/* A5 (v9): Merge level-unlocked accessories into avatar config without overriding user choices */
function applyLevelAccessories(pid,baseConfig){
  const cfg=typeof baseConfig==='string'?baseConfig:JSON.stringify(baseConfig);
  const unlocked=getUnlockedAccessories(pid);
  // Only auto-apply hat if user has explicitly chosen 'none' and hat is unlocked at level 5+
  const cfgObj=typeof baseConfig==='object'?{...baseConfig}:null;
  if(!cfgObj)return baseConfig; // old string format — can't merge safely
  if(unlocked.includes('hat')&&cfgObj.accessory==='none'){
    cfgObj.accessory='hat';
    if(!cfgObj.accessoryColor)cfgObj.accessoryColor='#d4a843';
  }
  return cfgObj;
}

/* A2 (v9): Apply avatar config colors to Pip sprite sheet at runtime */
function applySpriteColors(cfg){
  if(!cfg||typeof cfg!=='object')return;
  const sprite=document.getElementById('pip-sprite-sheet');if(!sprite)return;
  // Update skin gradient stops
  const s0=sprite.querySelector('#pip-skin-stop-0');
  const s1=sprite.querySelector('#pip-skin-stop-1');
  if(cfg.skin){
    // lighten for highlight stop, use base for main stop
    const hex=cfg.skin.replace('#','');
    const r=parseInt(hex.slice(0,2),16),g=parseInt(hex.slice(2,4),16),b=parseInt(hex.slice(4,6),16);
    const lighten=(v,a)=>Math.min(255,Math.round(v+(255-v)*a));
    const darken=(v,a)=>Math.max(0,Math.round(v*(1-a)));
    const ltHex=`#${[lighten(r,0.28),lighten(g,0.22),lighten(b,0.18)].map(x=>x.toString(16).padStart(2,'0')).join('')}`;
    const dkHex=`#${[darken(r,0.08),darken(g,0.08),darken(b,0.06)].map(x=>x.toString(16).padStart(2,'0')).join('')}`;
    if(s0)s0.setAttribute('stop-color',ltHex);
    if(s1)s1.setAttribute('stop-color',dkHex);
  }
  // Update hair gradient stops
  const h0=sprite.querySelector('#pip-hair-stop-0');
  const h1=sprite.querySelector('#pip-hair-stop-1');
  if(cfg.hairColor&&h0&&h1){
    h0.setAttribute('stop-color',cfg.hairColor);
    const hx=cfg.hairColor.replace('#','');
    const hr=parseInt(hx.slice(0,2),16),hg=parseInt(hx.slice(2,4),16),hb=parseInt(hx.slice(4,6),16);
    const dkHair=`#${[Math.max(0,Math.round(hr*0.6)),Math.max(0,Math.round(hg*0.6)),Math.max(0,Math.round(hb*0.6))].map(x=>x.toString(16).padStart(2,'0')).join('')}`;
    h1.setAttribute('stop-color',dkHair);
  }
  // Update outfit color via the injected style element
  const outfitStyle=sprite.querySelector('#pip-outfit-style');
  if(outfitStyle&&cfg.outfitColor1){
    outfitStyle.textContent=`.pip-outfit{fill:${cfg.outfitColor1}}`;
  }
}

/* ── Item 17: AvatarAnimator class — A1 (v9): expanded frame map with shrug + comeback ── */
class AvatarAnimator{
  constructor(container){
    this.container=container;
    this.currentAnim='idle';
    this.frame=0;
    this.loop=true;
    this._af=null;
    this._running=false;
    this._fps=12;
    this._lastFrame=0;
    /* A1 (v9): Added shrug (2 frames) and comeback (4 frames) */
    this.frames={idle:4,celebrate:4,jump:4,concerned:2,greeting:4,relief:2,victory:4,determined:2,relieved:2,shrug:2,comeback:4};
    this.start();
  }
  render(){
    const n=this.frames[this.currentAnim]||4;
    const fi=(this.frame%n)+1;
    const frameId=`pip-${this.currentAnim}-${fi}`;
    this.container.innerHTML=`<svg width="100%" height="100%" viewBox="0 0 100 100" style="overflow:visible"><use href="#${frameId}"/></svg>`;
  }
  start(){
    this._running=true;
    const interval=1000/this._fps;
    const step=(ts)=>{
      if(!this._running)return;
      this._af=requestAnimationFrame(step);
      if(ts-this._lastFrame<interval)return;
      this._lastFrame=ts;
      const n=this.frames[this.currentAnim]||4;
      if(this.frame>=n-1){
        if(this.loop){this.frame=0;}
        else{this.render();return;}
      } else {
        this.frame++;
      }
      this.render();
    };
    this._af=requestAnimationFrame(step);
    this.render();
  }
  play(anim,options={}){
    if(!(anim in this.frames))return;
    this.currentAnim=anim;
    this.frame=0;
    this.loop=options.loop!==false;
    this.render();
    // Auto-return to idle after one-shot animations
    if(!this.loop){
      const dur=(this.frames[anim]||4)/this._fps*1000+200;
      clearTimeout(this._idleTO);
      this._idleTO=setTimeout(()=>{
        /* Item 22: Apply jiggle to accessory on jump landing */
        if(anim==='jump'){
          const acc=this.container.querySelector('.pip-accessory');
          if(acc){acc.classList.remove('jiggle');void acc.offsetWidth;acc.classList.add('jiggle');}
        }
        this.play('idle',{loop:true});
      },dur);
    }
  }
  stop(){
    this._running=false;
    if(this._af)cancelAnimationFrame(this._af);
    clearTimeout(this._idleTO);
  }
}

const _liquidRings=new Map();
class LiquidRing{
  constructor(canvas,score,color){
    this.cv=canvas;this.ctx=canvas.getContext('2d');
    this.cv.width=62;this.cv.height=62;
    this.score=score;this.color=color;
    this.currentFill=0;this.targetFill=score/10;
    this.phase=0;this.velocity=0;this.af=null;this._running=true;
  }
  draw(){
    const{cv,ctx,currentFill,phase,color,score}=this;
    ctx.clearRect(0,0,62,62);
    // Outer ring
    ctx.beginPath();ctx.arc(31,31,26,0,Math.PI*2);
    ctx.strokeStyle=scCol(score);ctx.lineWidth=5.5;ctx.stroke();
    // Liquid fill
    ctx.save();

    const baseY=62-(currentFill*62);
    ctx.beginPath();
    ctx.moveTo(0,baseY+3*Math.sin(phase));
    for(let x=0;x<=62;x++){
      ctx.lineTo(x,baseY+3*Math.sin(x*0.04+phase));
    }
    ctx.lineTo(62,62);ctx.lineTo(0,62);ctx.closePath();

    const grad=ctx.createLinearGradient(0,baseY,0,62);
    grad.addColorStop(0,color+'cc');grad.addColorStop(1,color+'55');
    ctx.fillStyle=grad;ctx.globalAlpha=0.85;ctx.fill();
    ctx.restore();

    if(!settled){
      this.velocity+=(this.targetFill-this.currentFill)*0.08;
      this.velocity*=0.85;
      this.currentFill+=this.velocity;
      this.phase+=0.05;
    } else {
      this.velocity=0;
      this.phase+=0.02; // gentle idle wave — Item 5
    }
    this.draw();
    this.af=requestAnimationFrame(()=>this.animate());
  }
  stop(){this._running=false;if(this.af)cancelAnimationFrame(this.af)}

  updateScore(newScore){
    this.score=newScore;

      this._running=true;
      this.animate();
    }
  }
}
function initLiquidRings(){
  // A1: reuse existing rings where possible — call updateScore instead of recreating
  const seen=new Set();
  document.querySelectorAll('.ring-canvas').forEach(cv=>{
    const score=parseFloat(cv.dataset.score)||0;
    const color=cv.dataset.color||'#c9a84c';
    seen.add(cv.id);
    const existing=_liquidRings.get(cv.id);
    if(existing){
      // Reuse: just update the target fill for smooth animation
      existing.updateScore(score);
    } else {
      const lr=new LiquidRing(cv,score,color);
      _liquidRings.set(cv.id,lr);

  _liquidRings.forEach((lr,id)=>{if(!seen.has(id)){lr.stop();_liquidRings.delete(id)}});
}

/* E2: store a single load promise so rapid concurrent calls queue against

let _chartJsLoaded=false;

function ensureChartEngine(cb){
  if(typeof d3!=='undefined'){cb('d3');return}
  if(_chartJsLoaded){cb('chartjs');return}
  if(_chartJsLoadPromise){_chartJsLoadPromise.then(()=>cb('chartjs')).catch(()=>cb('svg'));return}
  _chartJsLoadPromise=new Promise((resolve,reject)=>{
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js';
    s.onload=()=>{_chartJsLoaded=true;resolve()};

    document.head.appendChild(s);

}

  ctx.fillStyle=grd;ctx.fill();

function getPeriodInsight(pid,days){
  const sph=gSph(pid);const logs=[...logsIn(pid,days)].sort((a,b)=>a.date.localeCompare(b.date));

  const logsWithScores=logs.filter(l=>Object.values(l.scores||{}).some(s=>s?.value!=null&&s.value!==null));
  if(logsWithScores.length===0)return'No scores yet';
  if(logsWithScores.length<3)return'Need a few more days';
  const validLogs=logsWithScores;
  const half=Math.floor(validLogs.length/2);
  const first=validLogs.slice(0,half);const second=validLogs.slice(half);
  // Find sphere with largest change
  let bestSph=null,bestDiff=0;
  sph.forEach(s=>{
    const a1=sAvg(first,s.id)??0;const a2=sAvg(second,s.id)??0;
    const diff=a2-a1;
    if(Math.abs(diff)>Math.abs(bestDiff)){bestDiff=diff;bestSph=s;}
  });
  const a1=oAvg(first,sph)??0;const a2=oAvg(second,sph)??0;
  const diff=a2-a1;
  const pct=a1>0?((Math.abs(diff)/a1)*100).toFixed(0):0;
  if(bestSph&&Math.abs(bestDiff)>0.5){
    if(bestDiff>0)return`${bestSph.name}: Up ${((bestDiff/Math.max(sAvg(first,bestSph.id)??0.1,0.1))*100).toFixed(0)}% this ${days===7?'week':days+'d'}`;
    return`${bestSph.name}: Steady improvement needed`;
  }
  if(diff>0.5)return`↑ Up ${pct}% this ${days===7?'week':days+'d'}`;
  if(diff<-0.5)return`↓ Down ${pct}% — stay focused`;

}

/* ── CHART RESIZE OBSERVER (B7) — FIX Issue 9: disconnect previous observer before re-attaching ── */
function attachChartResizeObserver(containerId,renderFn){
  const el=document.getElementById(containerId);if(!el)return;
  /* Disconnect the previous observer stored on the element, preventing zombie observers */
  if(el._resizeObserver){try{el._resizeObserver.disconnect();}catch(e){}el._resizeObserver=null;}
  let _roTimer=null;
  const ro=new ResizeObserver(()=>{
    if(el._rendering)return;
    clearTimeout(_roTimer);
    _roTimer=setTimeout(()=>{
      el._rendering=true;
      renderFn();
      requestAnimationFrame(()=>{el._rendering=false});
    },120);
  });
  ro.observe(el);
  /* Store on element so next call can disconnect it */
  el._resizeObserver=ro;
}

/* Issue 6 FIX: store a single observer instance and disconnect before re-observing */
let _revealObserver=null;
function revealElements(){
  if(_revealObserver){try{_revealObserver.disconnect();}catch(e){}_revealObserver=null;}
  const obs=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('vis');obs.unobserve(e.target)}})},{threshold:0.08});
